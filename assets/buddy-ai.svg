<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 350" width="900" height="350">
<style>
  .bg { fill: transparent; }
  .bg-solid { fill: #ffffff; }
  .border { stroke: #d0d7de; stroke-width: 1; fill: none; }
  .text-primary { fill: #24292f; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
  .text-secondary { fill: #57606a; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
  .accent-blue { stroke: #0969da; fill: none; }
  .accent-purple { stroke: #8250df; fill: none; }
  .fill-blue { fill: #0969da; opacity: 0.1; }
  .fill-purple { fill: #8250df; opacity: 0.1; }
  
  @media (prefers-color-scheme: dark) {
    .bg-solid { fill: #0d1117; }
    .border { stroke: #30363d; }
    .text-primary { fill: #c9d1d9; }
    .text-secondary { fill: #8b949e; }
    .accent-blue { stroke: #58a6ff; }
    .accent-purple { stroke: #bc8cff; }
    .fill-blue { fill: #58a6ff; opacity: 0.15; }
    .fill-purple { fill: #bc8cff; opacity: 0.15; }
  }
</style>
<rect width="900" height="350" class="bg"/>

<defs>
  <filter id="shadow" x="-5%" y="-5%" width="120%" height="120%">
    <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity="0.1" />
  </filter>
</defs>

<!-- Background Editor Window -->
<rect x="150" y="40" width="600" height="270" rx="8" class="bg-solid border"/>
<!-- Editor Header -->
<path d="M 150 70 L 750 70" class="border"/>
<!-- Mac Buttons -->
<circle cx="170" cy="55" r="4" class="border"/>
<circle cx="185" cy="55" r="4" class="border"/>
<circle cx="200" cy="55" r="4" class="border"/>
<!-- Editor Content (Mock Code Lines) -->
<rect x="180" y="90" width="300" height="8" rx="4" class="border"/>
<rect x="180" y="110" width="450" height="8" rx="4" class="fill-blue"/>
<rect x="180" y="130" width="200" height="8" rx="4" class="border"/>
<rect x="210" y="150" width="250" height="8" rx="4" class="border"/>
<rect x="210" y="170" width="350" height="8" rx="4" class="border"/>
<rect x="240" y="190" width="180" height="8" rx="4" class="border"/>

<!-- Floating Assistant Panel -->
<rect x="520" y="110" width="220" height="180" rx="12" class="bg-solid border" filter="url(#shadow)"/>
<!-- Inside Floating Panel -->
<circle cx="630" cy="170" r="30" class="fill-purple border"/>
<path d="M 605 170 Q 615 155, 630 170 T 655 170" class="accent-purple" stroke-width="3" stroke-linecap="round"/>
<path d="M 605 170 Q 615 185, 630 170 T 655 170" class="accent-blue" stroke-width="2" stroke-linecap="round"/>

<rect x="550" y="220" width="160" height="6" rx="3" class="fill-purple"/>
<rect x="560" y="240" width="140" height="6" rx="3" class="border"/>
<rect x="570" y="260" width="100" height="6" rx="3" class="border"/>

</svg>
