<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 200" fill="none">
  <defs>
    <linearGradient id="card-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="buddy-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#f093fb"/>
      <stop offset="100%" stop-color="#f5576c"/>
    </linearGradient>
    <filter id="card-shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Card background -->
  <rect width="420" height="200" rx="12" fill="url(#card-bg)" stroke="#2d2d5e" stroke-width="1" filter="url(#card-shadow)"/>

  <!-- Accent bar -->
  <rect x="0" y="0" width="420" height="4" rx="2" fill="url(#buddy-accent)"/>

  <!-- Icon area -->
  <g transform="translate(28, 30)">
    <rect width="44" height="44" rx="10" fill="#f093fb" opacity="0.15"/>
    <!-- Chat/Bot icon -->
    <g transform="translate(10, 9)" fill="none" stroke="#f093fb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21,12 C21,7 16.9,3 12,3 C7.1,3 3,7 3,12 C3,17 7.1,21 12,21 L21,21 Z"/>
      <circle cx="8" cy="12" r="1.5" fill="#f093fb" stroke="none"/>
      <circle cx="12" cy="12" r="1.5" fill="#f093fb" stroke="none"/>
      <circle cx="16" cy="12" r="1.5" fill="#f093fb" stroke="none"/>
    </g>
  </g>

  <!-- Project title -->
  <text x="84" y="50" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff">
    Buddy AI
  </text>

  <!-- Category badge -->
  <rect x="84" y="58" width="150" height="20" rx="10" fill="#f093fb" opacity="0.2"/>
  <text x="159" y="72" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="600" fill="#f0abfc" text-anchor="middle">
    AI / DESKTOP / VISION
  </text>

  <!-- Description -->
  <text x="28" y="110" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#94a3b8">
    Local-first floating AI writing and vision assistant
  </text>
  <text x="28" y="128" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#94a3b8">
    for Windows powered by Ollama. 9 writing modes,
  </text>
  <text x="28" y="146" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#94a3b8">
    screen capture analysis, and zero cloud dependency.
  </text>

  <!-- Tech stack chips -->
  <g transform="translate(28, 160)">
    <rect x="0" y="0" width="66" height="22" rx="11" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="33" y="15" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Electron</text>

    <rect x="74" y="0" width="52" height="22" rx="11" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="100" y="15" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">React</text>

    <rect x="134" y="0" width="60" height="22" rx="11" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="164" y="15" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Ollama</text>

    <rect x="202" y="0" width="86" height="22" rx="11" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="245" y="15" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">TypeScript</text>

    <rect x="296" y="0" width="56" height="22" rx="11" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="324" y="15" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Vision</text>
  </g>

  <!-- Arrow icon (top right) -->
  <g transform="translate(378, 28)" opacity="0.3">
    <line x1="0" y1="16" x2="16" y2="0" stroke="#f093fb" stroke-width="2" stroke-linecap="round"/>
    <polyline points="6,0 16,0 16,10" fill="none" stroke="#f093fb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
