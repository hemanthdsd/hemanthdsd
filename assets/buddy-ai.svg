<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 520" width="100%" height="100%">
  <defs>
    <!-- Gradient for Assistant Icon -->
    <linearGradient id="grad-icon" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0071E3"/>
      <stop offset="100%" stop-color="#7D5CFF"/>
    </linearGradient>

    <!-- Gradient for Floating Bubble -->
    <linearGradient id="grad-bubble" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5AC8FA"/>
      <stop offset="100%" stop-color="#7D5CFF"/>
    </linearGradient>

    <!-- Shadows -->
    <filter id="shadow-main" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="10" stdDeviation="20" flood-color="#000000" flood-opacity="0.04" />
    </filter>
    <filter id="shadow-panel" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="15" stdDeviation="25" flood-color="#000000" flood-opacity="0.08" />
    </filter>
    <filter id="shadow-bubble" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.1" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1400" height="520" fill="#F5F5F7" />

  <!-- TOP SECTION -->
  <text x="700" y="55" font-family="Arial, Helvetica, sans-serif" font-size="11" font-weight="600" fill="#6E6E73" letter-spacing="2" text-anchor="middle">FEATURED PROJECT</text>
  
  <text x="700" y="100" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700" fill="#0B0B0F" text-anchor="middle">Private AI assistance,</text>
  <text x="700" y="145" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700" fill="#0B0B0F" text-anchor="middle">wherever you work.</text>
  
  <text x="700" y="185" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#6E6E73" text-anchor="middle">A local-first Windows writing and vision assistant</text>
  <text x="700" y="210" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#6E6E73" text-anchor="middle">powered by private Ollama inference.</text>

  <!-- MIDDLE SECTION: ILLUSTRATION -->
  <!-- Main Window -->
  <g transform="translate(360, 250)">
    <rect x="0" y="0" width="560" height="180" rx="16" fill="#FFFFFF" stroke="#D2D2D7" stroke-width="1" filter="url(#shadow-main)" />
    
    <!-- Window Chrome -->
    <circle cx="20" cy="20" r="4.5" fill="#FF5F57" opacity="0.7" />
    <circle cx="36" cy="20" r="4.5" fill="#FEBC2E" opacity="0.7" />
    <circle cx="52" cy="20" r="4.5" fill="#28C840" opacity="0.7" />

    <!-- Content area: highlighted text -->
    <rect x="16" y="44" width="480" height="32" rx="6" fill="#0071E3" opacity="0.08" />
    <rect x="32" y="56" width="360" height="8" rx="4" fill="#0071E3" opacity="0.6" />
    
    <!-- Other text lines -->
    <rect x="24" y="94" width="460" height="8" rx="4" fill="#E5E5EA" />
    <rect x="24" y="118" width="420" height="8" rx="4" fill="#E5E5EA" />
    <rect x="24" y="142" width="300" height="8" rx="4" fill="#E5E5EA" />
  </g>

  <!-- Floating Assistant Panel -->
  <g transform="translate(800, 210)">
    <rect x="0" y="0" width="220" height="230" rx="12" fill="#FFFFFF" stroke="#D2D2D7" stroke-width="1" filter="url(#shadow-panel)" />
    
    <!-- Icon area -->
    <circle cx="36" cy="36" r="16" fill="url(#grad-icon)" />
    <!-- Title skeleton -->
    <rect x="64" y="32" width="100" height="8" rx="4" fill="#D2D2D7" />
    <rect x="64" y="48" width="60" height="6" rx="3" fill="#E5E5EA" />
    
    <!-- Fake text lines -->
    <rect x="20" y="80" width="180" height="8" rx="4" fill="#E5E5EA" />
    <rect x="20" y="100" width="160" height="8" rx="4" fill="#E5E5EA" />
    <rect x="20" y="120" width="170" height="8" rx="4" fill="#E5E5EA" />
    <rect x="20" y="140" width="130" height="8" rx="4" fill="#E5E5EA" />
    
    <!-- Action buttons skeleton -->
    <rect x="20" y="180" width="80" height="24" rx="12" fill="#0071E3" opacity="0.1" />
    <rect x="110" y="180" width="80" height="24" rx="12" fill="#F5F5F7" />
  </g>

  <!-- Floating Bubble/Widget -->
  <circle cx="1060" cy="380" r="18" fill="url(#grad-bubble)" filter="url(#shadow-bubble)" />

  <!-- BOTTOM SECTION -->
  <!-- Capability Pills -->
  <g transform="translate(362.5, 455)">
    <!-- Pill 1 -->
    <rect x="0" y="0" width="185" height="30" rx="15" fill="transparent" stroke="#D2D2D7" stroke-width="1" />
    <text x="92.5" y="19" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6E6E73" text-anchor="middle">Floating desktop assistant</text>

    <!-- Pill 2 -->
    <rect x="195" y="0" width="150" height="30" rx="15" fill="transparent" stroke="#D2D2D7" stroke-width="1" />
    <text x="270" y="19" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6E6E73" text-anchor="middle">Screen understanding</text>

    <!-- Pill 3 -->
    <rect x="355" y="0" width="150" height="30" rx="15" fill="transparent" stroke="#D2D2D7" stroke-width="1" />
    <text x="430" y="19" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6E6E73" text-anchor="middle">Selected-text actions</text>

    <!-- Pill 4 -->
    <rect x="515" y="0" width="160" height="30" rx="15" fill="transparent" stroke="#D2D2D7" stroke-width="1" />
    <text x="595" y="19" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#6E6E73" text-anchor="middle">Local, private inference</text>
  </g>

  <!-- Tech Stack Line -->
  <text x="700" y="505" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#6E6E73" text-anchor="middle">Electron · React · TypeScript · Ollama</text>

</svg>
