<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 520" width="1400" height="520">
    <defs>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="#000000" flood-opacity="0.8"/>
        </filter>
        <radialGradient id="glow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#2997ff" stop-opacity="1"/>
            <stop offset="100%" stop-color="#2997ff" stop-opacity="0"/>
        </radialGradient>
    </defs>
    <rect width="1400" height="520" fill="#000000"/>

    <text x="700" y="50" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#86868B" font-weight="600" letter-spacing="2" text-anchor="middle">FEATURED PROJECT</text>
    <text x="700" y="95" font-family="Arial, Helvetica, sans-serif" font-size="48" fill="#FFFFFF" font-weight="700" text-anchor="middle">Private AI assistance,</text>
    <text x="700" y="150" font-family="Arial, Helvetica, sans-serif" font-size="48" fill="#FFFFFF" font-weight="700" text-anchor="middle">wherever you work.</text>
    <text x="700" y="195" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#86868B" text-anchor="middle">A local-first Windows writing and vision assistant</text>
    <text x="700" y="225" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="#86868B" text-anchor="middle">powered by private Ollama inference.</text>

    <!-- UI Illustration -->
    <g transform="translate(250, 260)">
        <rect width="900" height="170" rx="16" fill="#111111" stroke="#333336" stroke-width="2"/>
        <circle cx="25" cy="25" r="5" fill="#333336"/>
        <circle cx="45" cy="25" r="5" fill="#333336"/>
        <circle cx="65" cy="25" r="5" fill="#333336"/>
        
        <!-- text lines -->
        <line x1="150" y1="60" x2="600" y2="60" stroke="#333336" stroke-width="8" stroke-linecap="round"/>
        <line x1="150" y1="85" x2="550" y2="85" stroke="#333336" stroke-width="8" stroke-linecap="round"/>
        <line x1="150" y1="110" x2="450" y2="110" stroke="#333336" stroke-width="8" stroke-linecap="round"/>
        <line x1="150" y1="135" x2="650" y2="135" stroke="#333336" stroke-width="8" stroke-linecap="round"/>
        
        <!-- selection box -->
        <rect x="140" y="50" width="470" height="45" rx="8" fill="#2997ff" fill-opacity="0.1" stroke="#2997ff" stroke-width="1.5" stroke-dasharray="4"/>
    </g>

    <!-- Overlapping Assistant -->
    <g transform="translate(850, 290)" filter="url(#shadow)">
        <rect width="240" height="160" rx="16" fill="#1c1c1e" stroke="#333336" stroke-width="2"/>
        <circle cx="120" cy="65" r="40" fill="url(#glow)"/>
        <circle cx="120" cy="65" r="12" fill="#FFFFFF"/>
        <rect x="30" y="120" width="180" height="10" rx="5" fill="#333336"/>
        <rect x="60" y="140" width="120" height="10" rx="5" fill="#333336"/>
    </g>

    <!-- Pills -->
    <g transform="translate(342.5, 450)">
        <rect x="0" y="0" width="180" height="30" rx="15" fill="#111111" stroke="#333336" stroke-width="1"/>
        <text x="90" y="19" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#86868B" text-anchor="middle">Floating desktop assistant</text>
        
        <rect x="195" y="0" width="160" height="30" rx="15" fill="#111111" stroke="#333336" stroke-width="1"/>
        <text x="275" y="19" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#86868B" text-anchor="middle">Screen understanding</text>

        <rect x="370" y="0" width="160" height="30" rx="15" fill="#111111" stroke="#333336" stroke-width="1"/>
        <text x="450" y="19" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#86868B" text-anchor="middle">Selected-text actions</text>

        <rect x="545" y="0" width="170" height="30" rx="15" fill="#111111" stroke="#333336" stroke-width="1"/>
        <text x="630" y="19" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#86868B" text-anchor="middle">Local, private inference</text>
    </g>

    <text x="700" y="500" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#86868B" text-anchor="middle">Electron · React · TypeScript · Ollama</text>
</svg>
