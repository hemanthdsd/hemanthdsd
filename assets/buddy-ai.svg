<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 350">
<style>
  .bg { fill: transparent; }
  .bg-panel { fill: #ffffff; }
  .border { stroke: #d0d7de; stroke-width: 1; fill: none; }
  .border-dashed { stroke: #d0d7de; stroke-width: 1; stroke-dasharray: 4 4; fill: none; }
  .text-primary { fill: #24292f; font-family: -apple-system, sans-serif; font-size: 14px; }
  .text-secondary { fill: #57606a; font-family: -apple-system, sans-serif; font-size: 12px; }
  .text-bold { font-weight: 600; }
  .accent-blue { stroke: #0969da; fill: none; }
  .accent-blue-dashed { stroke: #0969da; stroke-width: 2; stroke-dasharray: 6 4; fill: none; }
  .accent-purple { stroke: #8250df; fill: none; }
  .fill-blue { fill: #0969da; opacity: 0.15; }
  .fill-purple { fill: #8250df; opacity: 0.15; }
  .accent-red { stroke: #cf222e; fill: none; }
  .fill-red { fill: #cf222e; opacity: 0.15; }
  
  @media (prefers-color-scheme: dark) {
    .bg-panel { fill: #0d1117; }
    .border { stroke: #30363d; }
    .border-dashed { stroke: #30363d; }
    .text-primary { fill: #c9d1d9; }
    .text-secondary { fill: #8b949e; }
    .accent-blue { stroke: #58a6ff; }
    .accent-blue-dashed { stroke: #58a6ff; }
    .accent-purple { stroke: #bc8cff; }
    .fill-blue { fill: #58a6ff; opacity: 0.2; }
    .fill-purple { fill: #bc8cff; opacity: 0.2; }
    .accent-red { stroke: #ff7b72; }
    .fill-red { fill: #ff7b72; opacity: 0.2; }
  }
</style>

<!-- Background IDE/Browser window (dashed/lower opacity) -->
<rect x="50" y="20" width="800" height="310" rx="8" class="border-dashed" />
<line x1="50" y1="60" x2="850" y2="60" class="border-dashed" />
<!-- Fake code lines in IDE -->
<rect x="80" y="90" width="300" height="8" rx="4" class="border-dashed" />
<rect x="100" y="115" width="250" height="8" rx="4" class="border-dashed" />
<rect x="100" y="140" width="350" height="8" rx="4" class="border-dashed" />
<rect x="100" y="165" width="200" height="8" rx="4" class="border-dashed" />
<rect x="80" y="190" width="150" height="8" rx="4" class="border-dashed" />

<!-- Screen Capture Overlay (distinct dashed selection over part of the IDE) -->
<rect x="70" y="80" width="400" height="130" class="accent-blue-dashed fill-blue" />
<text x="80" y="230" class="text-secondary accent-blue" style="stroke: none;">Captured Area</text>

<!-- Floating Assistant Panel -->
<rect x="550" y="50" width="270" height="260" rx="8" class="border bg-panel" style="filter: drop-shadow(0 4px 12px rgba(0,0,0,0.15));" />

<!-- Assistant Header -->
<text x="570" y="85" class="text-primary text-bold" font-size="16">Buddy AI (Ollama Local)</text>
<line x1="550" y1="100" x2="820" y2="100" class="border" />

<!-- Chat Bubble -->
<rect x="570" y="120" width="220" height="80" rx="8" class="border" />

<text x="585" y="145" class="text-secondary">Analyzing selection...</text>
<text x="585" y="170" class="text-primary">"Improving grammar..."</text>
<rect x="585" y="180" width="150" height="4" rx="2" class="fill-blue" />
<rect x="585" y="180" width="80" height="4" rx="2" class="accent-blue" style="fill: #0969da;" />

<!-- Action Buttons -->
<rect x="570" y="260" width="105" height="30" rx="4" class="border" />
<text x="590" y="280" class="text-secondary">Regenerate</text>

<rect x="685" y="260" width="105" height="30" rx="4" class="border" />
<text x="710" y="280" class="text-secondary">Apply</text>

</svg>
