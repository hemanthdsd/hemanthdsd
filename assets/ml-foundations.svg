<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 420" width="680" height="420">
    <defs>
        <filter id="glow-indigo" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <filter id="glow-blue" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    <rect width="678" height="418" x="1" y="1" rx="24" fill="#111111" stroke="#333336" stroke-width="2"/>
    <text x="340" y="60" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#86868B" font-weight="600" letter-spacing="2" text-anchor="middle">MACHINE LEARNING</text>
    <text x="340" y="105" font-family="Arial, Helvetica, sans-serif" font-size="32" fill="#FFFFFF" font-weight="700" text-anchor="middle">From raw data</text>
    <text x="340" y="145" font-family="Arial, Helvetica, sans-serif" font-size="32" fill="#FFFFFF" font-weight="700" text-anchor="middle">to validated models.</text>
    <text x="340" y="185" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#86868B" text-anchor="middle">EDA, NLP classification, model evaluation</text>
    <text x="340" y="205" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#86868B" text-anchor="middle">and hyperparameter optimization.</text>
    
    <!-- S-curve and boundary -->
    <g transform="translate(340, 280)">
        <path d="M -120 40 C -60 40, -30 -40, 30 -40 C 90 -40, 110 20, 130 -20" fill="none" stroke="#2997ff" stroke-width="2.5" filter="url(#glow-blue)"/>
        <path d="M -120 50 C -60 50, -30 -30, 30 -30 C 90 -30, 110 30, 130 -10" fill="none" stroke="#5e5ce6" stroke-width="2" stroke-dasharray="6,4" filter="url(#glow-indigo)"/>
        
        <circle cx="-120" cy="40" r="4" fill="#2997ff"/>
        <circle cx="30" cy="-40" r="4" fill="#2997ff"/>
        <circle cx="130" cy="-20" r="4" fill="#2997ff"/>
    </g>
    
    <text x="340" y="380" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#86868B" text-anchor="middle">Python · Scikit-learn · NLTK · TensorFlow</text>
</svg>
