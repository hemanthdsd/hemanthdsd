<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 280">
  <defs>
    <style>
      .bg { fill: #0F1923; stroke: #2a3a4a; stroke-width: 1; }
      .accent { fill: #22D3EE; }
      .text-code { font-family: Arial, Helvetica, sans-serif; font-size: 12px; fill: #22D3EE; font-weight: bold; letter-spacing: 1px; }
      .text-title { font-family: Arial, Helvetica, sans-serif; font-size: 24px; font-weight: bold; fill: #ECE8E1; }
      .text-subtitle { font-family: Arial, Helvetica, sans-serif; font-size: 14px; fill: #768079; letter-spacing: 2px; }
      .text-brief { font-family: Arial, Helvetica, sans-serif; font-size: 12px; fill: #768079; }
      .badge-bg { fill: #1a2332; stroke: #2a3a4a; stroke-width: 1; }
      .badge-text { font-family: Arial, Helvetica, sans-serif; font-size: 11px; fill: #ECE8E1; font-weight: bold; }
      .label-bottom { font-family: Arial, Helvetica, sans-serif; font-size: 10px; fill: #768079; letter-spacing: 1px; text-anchor: end; }
      
      .node { fill: #1a2332; stroke: #22D3EE; stroke-width: 2; }
      .node-core { fill: #FF4655; stroke: none; }
      .edge { fill: none; stroke: #768079; stroke-width: 1; opacity: 0.6; }
      .boundary { fill: none; stroke: #FF4655; stroke-width: 2; stroke-dasharray: 6,4; }
    </style>
  </defs>

  <!-- Background -->
  <rect x="0.5" y="0.5" width="579" height="279" class="bg" />
  <rect x="0" y="0" width="4" height="280" class="accent" />

  <!-- Top-left Code -->
  <rect x="30" y="27" width="8" height="8" class="accent" />
  <text x="45" y="35" class="text-code">MLF-004</text>

  <!-- Texts -->
  <text x="30" y="85" class="text-title">ML FOUNDATIONS</text>
  <text x="30" y="105" class="text-subtitle">NLP CLASSIFICATION</text>
  
  <text x="30" y="140" class="text-brief">End-to-end NLP text classification with TF-IDF</text>
  <text x="30" y="158" class="text-brief">vectorization, cross-validation, and scikit-learn</text>
  <text x="30" y="176" class="text-brief">model optimization.</text>

  <!-- Tech Badges -->
  <g transform="translate(30, 205)">
    <rect x="0" y="0" width="55" height="24" rx="3" class="badge-bg" />
    <text x="27.5" y="16" class="badge-text" text-anchor="middle">Python</text>
    
    <rect x="65" y="0" width="75" height="24" rx="3" class="badge-bg" />
    <text x="102.5" y="16" class="badge-text" text-anchor="middle">Scikit-learn</text>
    
    <rect x="150" y="0" width="45" height="24" rx="3" class="badge-bg" />
    <text x="172.5" y="16" class="badge-text" text-anchor="middle">NLTK</text>
    
    <rect x="205" y="0" width="80" height="24" rx="3" class="badge-bg" />
    <text x="245" y="16" class="badge-text" text-anchor="middle">TensorFlow</text>
  </g>

  <!-- Right side illustration (Neural Network Nodes) -->
  <g transform="translate(430, 140)">
    <!-- Edges -->
    <line x1="-50" y1="-50" x2="-10" y2="-20" class="edge" />
    <line x1="-50" y1="10" x2="-10" y2="-20" class="edge" />
    <line x1="-50" y1="10" x2="-10" y2="30" class="edge" />
    <line x1="-50" y1="60" x2="-10" y2="30" class="edge" />
    <line x1="-10" y1="-20" x2="30" y2="5" class="edge" />
    <line x1="-10" y1="30" x2="30" y2="5" class="edge" />
    <line x1="30" y1="5" x2="70" y2="-30" class="edge" />
    <line x1="30" y1="5" x2="70" y2="40" class="edge" />

    <!-- Boundary line -->
    <path d="M10,-80 L10,90" class="boundary" />

    <!-- Nodes -->
    <!-- Input layer -->
    <circle cx="-50" cy="-50" r="6" class="node" />
    <circle cx="-50" cy="10" r="6" class="node" />
    <circle cx="-50" cy="60" r="6" class="node" />
    
    <!-- Hidden layer 1 -->
    <circle cx="-10" cy="-20" r="8" class="node" />
    <circle cx="-10" cy="30" r="8" class="node" />
    
    <!-- Hidden layer 2 -->
    <circle cx="30" cy="5" r="10" class="node" />
    <circle cx="30" cy="5" r="4" class="node-core" />
    
    <!-- Output layer -->
    <circle cx="70" cy="-30" r="6" class="node" stroke="#FF4655" />
    <circle cx="70" cy="40" r="6" class="node" />
    
    <!-- Extra decorative elements -->
    <rect x="65" y="-35" width="10" height="10" fill="none" stroke="#22D3EE" stroke-width="1" />
  </g>

  <!-- Bottom Right Label -->
  <text x="550" y="255" class="label-bottom">TACTICAL // ML</text>
  
  <!-- Decorative corner elements -->
  <path d="M 570 10 L 570 20 M 570 10 L 560 10" fill="none" stroke="#2a3a4a" stroke-width="1" />
  <path d="M 570 270 L 570 260 M 570 270 L 560 270" fill="none" stroke="#2a3a4a" stroke-width="1" />
</svg>
