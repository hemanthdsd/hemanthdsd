<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200">
<style>
  .bg { fill: transparent; }
  .border { stroke: #d0d7de; stroke-width: 1; fill: none; }
  .text-primary { fill: #24292f; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
  .text-secondary { fill: #57606a; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
  .accent-blue { stroke: #0969da; fill: none; }
  .accent-purple { stroke: #8250df; fill: none; }
  .fill-blue { fill: #0969da; opacity: 0.1; }
  .fill-purple { fill: #8250df; opacity: 0.1; }
  
  @media (prefers-color-scheme: dark) {
    .border { stroke: #30363d; }
    .text-primary { fill: #c9d1d9; }
    .text-secondary { fill: #8b949e; }
    .accent-blue { stroke: #58a6ff; }
    .accent-purple { stroke: #bc8cff; }
    .fill-blue { fill: #58a6ff; opacity: 0.15; }
    .fill-purple { fill: #bc8cff; opacity: 0.15; }
  }
</style>
<rect width="100%" height="100%" class="bg" />

<!-- Grid -->
<g class="border" stroke-opacity="0.3">
  <line x1="0" y1="50" x2="900" y2="50" />
  <line x1="0" y1="100" x2="900" y2="100" />
  <line x1="0" y1="150" x2="900" y2="150" />
  
  <line x1="150" y1="0" x2="150" y2="200" />
  <line x1="300" y1="0" x2="300" y2="200" />
  <line x1="450" y1="0" x2="450" y2="200" />
  <line x1="600" y1="0" x2="600" y2="200" />
  <line x1="750" y1="0" x2="750" y2="200" />
</g>

<!-- Data points (scattered) -->
<g class="accent-purple" stroke-width="1.5">
  <circle cx="100" cy="180" r="3" />
  <circle cx="200" cy="170" r="3" />
  <circle cx="250" cy="185" r="3" />
  <circle cx="350" cy="160" r="3" />
  <circle cx="400" cy="130" r="3" />
  
  <circle cx="500" cy="70" r="3" />
  <circle cx="550" cy="40" r="3" />
  <circle cx="650" cy="15" r="3" />
  <circle cx="700" cy="30" r="3" />
  <circle cx="800" cy="20" r="3" />
</g>

<!-- S-curve (Logistic Regression) -->
<path d="M 0 190 C 350 190, 350 10, 900 10" class="accent-blue" stroke-width="2" />
</svg>
