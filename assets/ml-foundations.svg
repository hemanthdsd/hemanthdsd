<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 200" fill="none">
  <defs>
    <linearGradient id="card-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="ml-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fa709a"/>
      <stop offset="100%" stop-color="#fee140"/>
    </linearGradient>
    <filter id="card-shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Card background -->
  <rect width="420" height="200" rx="12" fill="url(#card-bg)" stroke="#2d2d5e" stroke-width="1" filter="url(#card-shadow)"/>

  <!-- Accent bar -->
  <rect x="0" y="0" width="420" height="4" rx="2" fill="url(#ml-accent)"/>

  <!-- Icon area -->
  <g transform="translate(28, 30)">
    <rect width="44" height="44" rx="10" fill="#fa709a" opacity="0.15"/>
    <!-- Brain/ML icon -->
    <g transform="translate(10, 8)" fill="none" stroke="#fa709a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12,2 C8,2 5,5 5,8 C3,8.5 2,10 2,12 C2,14 3.5,15.5 5,16 C5,19 8,22 12,22 C16,22 19,19 19,16 C20.5,15.5 22,14 22,12 C22,10 21,8.5 19,8 C19,5 16,2 12,2Z"/>
      <line x1="12" y1="8" x2="12" y2="16"/>
      <line x1="8" y1="12" x2="16" y2="12"/>
    </g>
  </g>

  <!-- Project title -->
  <text x="84" y="50" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff">
    ML Foundations
  </text>

  <!-- Category badge -->
  <rect x="84" y="58" width="100" height="20" rx="10" fill="#fa709a" opacity="0.2"/>
  <text x="134" y="72" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="600" fill="#fda4af" text-anchor="middle">
    ML / NLP
  </text>

  <!-- Description -->
  <text x="28" y="110" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#94a3b8">
    End-to-end NLP text classification pipeline for
  </text>
  <text x="28" y="128" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#94a3b8">
    categorizing news articles with TF-IDF vectorization,
  </text>
  <text x="28" y="146" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#94a3b8">
    cross-validation, and hyperparameter tuning.
  </text>

  <!-- Tech stack chips -->
  <g transform="translate(28, 160)">
    <rect x="0" y="0" width="56" height="22" rx="11" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="28" y="15" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Python</text>

    <rect x="64" y="0" width="70" height="22" rx="11" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="99" y="15" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Scikit-learn</text>

    <rect x="142" y="0" width="44" height="22" rx="11" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="164" y="15" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">NLTK</text>

    <rect x="194" y="0" width="82" height="22" rx="11" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="235" y="15" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">TensorFlow</text>

    <rect x="284" y="0" width="68" height="22" rx="11" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="318" y="15" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Jupyter</text>
  </g>

  <!-- Arrow icon (top right) -->
  <g transform="translate(378, 28)" opacity="0.3">
    <line x1="0" y1="16" x2="16" y2="0" stroke="#fa709a" stroke-width="2" stroke-linecap="round"/>
    <polyline points="6,0 16,0 16,10" fill="none" stroke="#fa709a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
