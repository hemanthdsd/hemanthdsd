<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300">
<style>
  .bg { fill: transparent; }
  .border { stroke: #d0d7de; stroke-width: 1; fill: none; }
  .text-primary { fill: #24292f; font-family: -apple-system, sans-serif; font-size: 14px; }
  .text-secondary { fill: #57606a; font-family: -apple-system, sans-serif; font-size: 12px; }
  .text-bold { font-weight: 600; }
  .accent-blue { stroke: #0969da; fill: none; }
  .accent-purple { stroke: #8250df; fill: none; }
  .fill-blue { fill: #0969da; opacity: 0.15; }
  .fill-purple { fill: #8250df; opacity: 0.15; }
  .accent-green { stroke: #1a7f37; }
  
  @media (prefers-color-scheme: dark) {
    .border { stroke: #30363d; }
    .text-primary { fill: #c9d1d9; }
    .text-secondary { fill: #8b949e; }
    .accent-blue { stroke: #58a6ff; }
    .accent-purple { stroke: #bc8cff; }
    .fill-blue { fill: #58a6ff; opacity: 0.2; }
    .fill-purple { fill: #bc8cff; opacity: 0.2; }
    .accent-green { stroke: #2ea043; }
  }
</style>
<rect width="100%" height="100%" class="bg" />

<!-- Central Box -->
<rect x="350" y="20" width="200" height="50" rx="4" class="border" />
<text x="450" y="50" text-anchor="middle" class="text-primary text-bold">Autonomous Decision Engine</text>

<!-- Marker for arrows -->
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M 0 0 L 10 5 L 0 10 z" class="border" fill="#d0d7de"/>
  </marker>
</defs>

<!-- Arrows -->
<path d="M 450 70 L 250 120" class="border" marker-end="url(#arrow)" />
<path d="M 450 70 L 650 120" class="border" marker-end="url(#arrow)" />

<!-- Option A -->
<rect x="150" y="120" width="200" height="50" rx="4" class="border" />
<text x="250" y="150" text-anchor="middle" class="text-primary">Option A: Veer Left (Pedestrians)</text>

<!-- Option B -->
<rect x="550" y="120" width="200" height="50" rx="4" class="border" />
<text x="650" y="150" text-anchor="middle" class="text-primary">Option B: Veer Right (Barrier)</text>

<!-- Scorecard Table -->
<rect x="250" y="200" width="400" height="80" rx="4" class="border" />
<line x1="250" y1="230" x2="650" y2="230" class="border" />
<line x1="450" y1="230" x2="450" y2="280" class="border" />
<text x="450" y="220" text-anchor="middle" class="text-primary text-bold">Fairness &amp; Risk Scorecard</text>
<text x="350" y="260" text-anchor="middle" class="text-primary">Risk Score: 0.85</text>
<text x="550" y="260" text-anchor="middle" class="text-primary">Bias Penalty: 12%</text>

</svg>
