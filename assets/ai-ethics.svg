<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 280">
  <defs>
    <style>
      .bg { fill: #0F1923; stroke: #2a3a4a; stroke-width: 1; }
      .accent { fill: #FF4655; }
      .text-code { font-family: Arial, Helvetica, sans-serif; font-size: 12px; fill: #FF4655; font-weight: bold; letter-spacing: 1px; }
      .text-title { font-family: Arial, Helvetica, sans-serif; font-size: 24px; font-weight: bold; fill: #ECE8E1; }
      .text-subtitle { font-family: Arial, Helvetica, sans-serif; font-size: 14px; fill: #768079; letter-spacing: 2px; }
      .text-brief { font-family: Arial, Helvetica, sans-serif; font-size: 12px; fill: #768079; }
      .badge-bg { fill: #1a2332; stroke: #2a3a4a; stroke-width: 1; }
      .badge-text { font-family: Arial, Helvetica, sans-serif; font-size: 11px; fill: #ECE8E1; font-weight: bold; }
      .label-bottom { font-family: Arial, Helvetica, sans-serif; font-size: 10px; fill: #768079; letter-spacing: 1px; text-anchor: end; }
      
      .shield { fill: none; stroke: #FF4655; stroke-width: 2; }
      .scan-line { fill: none; stroke: #768079; stroke-width: 1; opacity: 0.5; }
      .dot-red { fill: #FF4655; }
      .dot-yellow { fill: #768079; }
      .dot-green { fill: #22D3EE; }
    </style>
  </defs>

  <!-- Background -->
  <rect x="0.5" y="0.5" width="579" height="279" class="bg" />
  <rect x="0" y="0" width="4" height="280" class="accent" />

  <!-- Top-left Code -->
  <rect x="30" y="27" width="8" height="8" class="accent" />
  <text x="45" y="35" class="text-code">ETH-003</text>

  <!-- Texts -->
  <text x="30" y="85" class="text-title">AI ETHICS AUDITING</text>
  <text x="30" y="105" class="text-subtitle">SIMULATION</text>
  
  <text x="30" y="140" class="text-brief">CARLA-based autonomous vehicle ethical dilemma simulation</text>
  <text x="30" y="158" class="text-brief">with collision telemetry and moral decision auditing.</text>

  <!-- Tech Badges -->
  <g transform="translate(30, 205)">
    <rect x="0" y="0" width="55" height="24" rx="3" class="badge-bg" />
    <text x="27.5" y="16" class="badge-text" text-anchor="middle">Python</text>
    
    <rect x="65" y="0" width="55" height="24" rx="3" class="badge-bg" />
    <text x="92.5" y="16" class="badge-text" text-anchor="middle">CARLA</text>
    
    <rect x="130" y="0" width="60" height="24" rx="3" class="badge-bg" />
    <text x="160" y="16" class="badge-text" text-anchor="middle">Pygame</text>
  </g>

  <!-- Right side illustration -->
  <g transform="translate(420, 80)">
    <!-- Abstract shield -->
    <path d="M50,0 L100,20 L100,70 C100,100 50,130 50,130 C50,130 0,100 0,70 L0,20 Z" class="shield" />
    
    <!-- Inner geometric elements -->
    <path d="M50,20 L80,35 L80,65 C80,85 50,105 50,105 C50,105 20,85 20,65 L20,35 Z" fill="none" stroke="#2a3a4a" stroke-width="2" />
    
    <!-- Scan lines -->
    <line x1="10" y1="40" x2="90" y2="40" class="scan-line" />
    <line x1="-10" y1="60" x2="110" y2="60" class="scan-line" stroke="#22D3EE" opacity="0.8" stroke-dasharray="4,4" />
    <line x1="10" y1="80" x2="90" y2="80" class="scan-line" />
    <line x1="25" y1="100" x2="75" y2="100" class="scan-line" />

    <!-- Risk indicator dots -->
    <circle cx="50" cy="50" r="4" class="dot-red" />
    <circle cx="35" cy="75" r="3" class="dot-yellow" />
    <circle cx="65" cy="75" r="3" class="dot-green" />
    <circle cx="50" cy="90" r="2" class="dot-yellow" />
    
    <!-- Target marker -->
    <line x1="45" y1="50" x2="55" y2="50" stroke="#0F1923" stroke-width="1" />
    <line x1="50" y1="45" x2="50" y2="55" stroke="#0F1923" stroke-width="1" />
  </g>

  <!-- Bottom Right Label -->
  <text x="550" y="255" class="label-bottom">TACTICAL // SIMULATION</text>
  
  <!-- Decorative corner elements -->
  <path d="M 570 10 L 570 20 M 570 10 L 560 10" fill="none" stroke="#2a3a4a" stroke-width="1" />
  <path d="M 570 270 L 570 260 M 570 270 L 560 270" fill="none" stroke="#2a3a4a" stroke-width="1" />
</svg>
