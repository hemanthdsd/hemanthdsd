<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200">
<style>
  .bg { fill: transparent; }
  .border { stroke: #d0d7de; stroke-width: 1; fill: none; }
  .text-primary { fill: #24292f; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
  .text-secondary { fill: #57606a; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
  .accent-blue { stroke: #0969da; fill: none; }
  .accent-purple { stroke: #8250df; fill: none; }
  .fill-blue { fill: #0969da; opacity: 0.1; }
  .fill-purple { fill: #8250df; opacity: 0.1; }
  
  @media (prefers-color-scheme: dark) {
    .border { stroke: #30363d; }
    .text-primary { fill: #c9d1d9; }
    .text-secondary { fill: #8b949e; }
    .accent-blue { stroke: #58a6ff; }
    .accent-purple { stroke: #bc8cff; }
    .fill-blue { fill: #58a6ff; opacity: 0.15; }
    .fill-purple { fill: #bc8cff; opacity: 0.15; }
  }
</style>
<rect width="100%" height="100%" class="bg" />

<!-- Radiating lines -->
<line x1="450" y1="100" x2="250" y2="50" class="border" />
<line x1="450" y1="100" x2="300" y2="150" class="border" />
<line x1="450" y1="100" x2="650" y2="50" class="border" />
<line x1="450" y1="100" x2="600" y2="150" class="border" />
<line x1="450" y1="100" x2="150" y2="100" class="border" />
<line x1="450" y1="100" x2="750" y2="100" class="border" />

<!-- Central Node -->
<polygon points="450,70 480,100 450,130 420,100" class="border" fill="#fff" />
<polygon points="450,70 480,100 450,130 420,100" class="fill-purple" />

<!-- Smaller Nodes -->
<circle cx="250" cy="50" r="15" class="border" />
<circle cx="250" cy="50" r="15" class="fill-blue" />

<circle cx="300" cy="150" r="12" class="border" />

<circle cx="650" cy="50" r="18" class="border" />
<circle cx="650" cy="50" r="18" class="fill-purple" />

<circle cx="600" cy="150" r="15" class="border" />
<circle cx="600" cy="150" r="15" class="fill-blue" />

<circle cx="150" cy="100" r="10" class="border" />
<circle cx="750" cy="100" r="10" class="border" />
</svg>
