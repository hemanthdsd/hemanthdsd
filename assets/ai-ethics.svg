<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 420" width="680" height="420">
    <defs>
        <filter id="glow-blue" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
        <filter id="glow-indigo" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>
    <rect width="678" height="418" x="1" y="1" rx="24" fill="#111111" stroke="#333336" stroke-width="2"/>
    <text x="340" y="60" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#86868B" font-weight="600" letter-spacing="2" text-anchor="middle">AI ETHICS</text>
    <text x="340" y="105" font-family="Arial, Helvetica, sans-serif" font-size="32" fill="#FFFFFF" font-weight="700" text-anchor="middle">Making responsible AI</text>
    <text x="340" y="145" font-family="Arial, Helvetica, sans-serif" font-size="32" fill="#FFFFFF" font-weight="700" text-anchor="middle">measurable.</text>
    <text x="340" y="185" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#86868B" text-anchor="middle">Governance, fairness, risk analysis and</text>
    <text x="340" y="205" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#86868B" text-anchor="middle">auditability through simulation.</text>
    
    <!-- Shield -->
    <g transform="translate(340, 280)">
        <path d="M 0 -50 L 50 -30 L 40 30 C 20 50, 0 60, 0 60 C 0 60, -20 50, -40 30 L -50 -30 Z" fill="#1c1c1e" stroke="#333336" stroke-width="2"/>
        <line x1="-15" y1="-5" x2="0" y2="20" stroke="#333336" stroke-width="1.5"/>
        <line x1="15" y1="-10" x2="0" y2="20" stroke="#333336" stroke-width="1.5"/>
        <line x1="-15" y1="-5" x2="15" y2="-10" stroke="#333336" stroke-width="1.5"/>
        <circle cx="-15" cy="-5" r="5" fill="#2997ff" filter="url(#glow-blue)"/>
        <circle cx="15" cy="-10" r="5" fill="#86868B"/>
        <circle cx="0" cy="20" r="6" fill="#5e5ce6" filter="url(#glow-indigo)"/>
    </g>
    
    <text x="340" y="380" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#86868B" text-anchor="middle">Python · CARLA · Pygame</text>
</svg>
