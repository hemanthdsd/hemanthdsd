<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 180" width="100%" height="100%">
  <!-- Background -->
  <rect x="2" y="2" width="1396" height="176" rx="24" fill="#111111" stroke="#333336" stroke-width="2"/>

  <!-- Connecting Line -->
  <line x1="300" y1="70" x2="1100" y2="70" stroke="#333336" stroke-width="2"/>
  
  <g font-family="Arial, Helvetica, sans-serif" text-anchor="middle">
    <!-- Stage 1 -->
    <circle cx="300" cy="70" r="28" fill="#000000" stroke="#333336" stroke-width="2"/>
    <text x="300" y="75" fill="#2997ff" font-size="14" font-weight="bold">01</text>
    <text x="300" y="125" fill="#FFFFFF" font-size="13" font-weight="700">UNDERSTAND</text>
    
    <!-- Stage 2 -->
    <circle cx="566" cy="70" r="28" fill="#000000" stroke="#333336" stroke-width="2"/>
    <text x="566" y="75" fill="#2997ff" font-size="14" font-weight="bold">02</text>
    <text x="566" y="125" fill="#FFFFFF" font-size="13" font-weight="700">DESIGN</text>
    
    <!-- Stage 3 -->
    <circle cx="833" cy="70" r="28" fill="#000000" stroke="#333336" stroke-width="2"/>
    <text x="833" y="75" fill="#2997ff" font-size="14" font-weight="bold">03</text>
    <text x="833" y="125" fill="#FFFFFF" font-size="13" font-weight="700">BUILD</text>
    
    <!-- Stage 4 -->
    <circle cx="1100" cy="70" r="28" fill="#000000" stroke="#333336" stroke-width="2"/>
    <text x="1100" y="75" fill="#2997ff" font-size="14" font-weight="bold">04</text>
    <text x="1100" y="125" fill="#FFFFFF" font-size="13" font-weight="700">VALIDATE</text>
    
    <!-- Bottom text -->
    <text x="700" y="160" fill="#86868B" font-size="14">Start with the decision, build the smallest useful product, and improve it through evidence.</text>
  </g>
</svg>
