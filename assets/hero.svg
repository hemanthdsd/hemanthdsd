<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 600" width="100%" height="100%" style="background-color: #F5F5F7; font-family: Arial, Helvetica, sans-serif;">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0071E3" />
      <stop offset="100%" stop-color="#7D5CFF" />
    </linearGradient>
    <radialGradient id="grad2" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#0071E3" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#7D5CFF" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="softBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0071E3" stop-opacity="0.04" />
      <stop offset="100%" stop-color="#0071E3" stop-opacity="0" />
    </radialGradient>
    
    <filter id="glass" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#0B0B0F" flood-opacity="0.04" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1400" height="600" fill="#F5F5F7" />

  <!-- LEFT SIDE -->
  <g transform="translate(100, 164)">
    <text x="0" y="0" font-size="16" font-weight="600" fill="#6E6E73" letter-spacing="1.5">SAI DURGA HEMANTH DAVULOORI</text>
    
    <text x="0" y="60" font-size="56" font-weight="700" fill="#0B0B0F">AI systems.</text>
    <text x="0" y="128" font-size="56" font-weight="700" fill="#0B0B0F">Full-stack products.</text>
    <text x="0" y="196" font-size="56" font-weight="700" fill="#0B0B0F">Useful intelligence.</text>

    <text x="0" y="246" font-size="18" fill="#6E6E73">I turn complex operational problems into</text>
    <text x="0" y="272" font-size="18" fill="#6E6E73">explainable, deployable products.</text>
  </g>

  <!-- RIGHT SIDE (Center around 1000, 300) -->
  <g transform="translate(1000, 300)">
    <!-- Large soft radial gradient circle behind everything -->
    <circle cx="0" cy="0" r="350" fill="url(#softBg)" />
    
    <!-- Layered translucent shapes -->
    <rect x="-200" y="-150" width="300" height="200" rx="20" fill="url(#grad1)" fill-opacity="0.06" transform="rotate(-15)" />
    <rect x="-50" y="-100" width="280" height="220" rx="20" fill="url(#grad1)" fill-opacity="0.08" transform="rotate(10)" />
    <rect x="-150" y="50" width="320" height="180" rx="20" fill="url(#grad1)" fill-opacity="0.12" transform="rotate(-5)" />
    
    <!-- One slightly more opaque circle with radialGradient -->
    <circle cx="80" cy="-40" r="120" fill="url(#grad2)" />
    
    <!-- Subtle connection lines -->
    <g stroke="#D2D2D7" stroke-width="1" stroke-opacity="0.8">
      <line x1="-120" y1="-80" x2="40" y2="-120" />
      <line x1="40" y1="-120" x2="160" y2="-30" />
      <line x1="160" y1="-30" x2="90" y2="100" />
      <line x1="90" y1="100" x2="-60" y2="140" />
      <line x1="-60" y1="140" x2="-140" y2="40" />
      <line x1="-140" y1="40" x2="-120" y2="-80" />
      
      <line x1="-140" y1="40" x2="20" y2="20" />
      <line x1="20" y1="20" x2="160" y2="-30" />
      <line x1="-120" y1="-80" x2="20" y2="20" />
      <line x1="90" y1="100" x2="20" y2="20" />
    </g>

    <!-- Floating nodes (8-10 small circles) -->
    <circle cx="-120" cy="-80" r="6" fill="#0071E3" fill-opacity="0.4" />
    <circle cx="40" cy="-120" r="5" fill="#7D5CFF" fill-opacity="0.3" />
    <circle cx="160" cy="-30" r="8" fill="#5AC8FA" fill-opacity="0.3" />
    <circle cx="90" cy="100" r="7" fill="#0071E3" fill-opacity="0.4" />
    <circle cx="-60" cy="140" r="5" fill="#7D5CFF" fill-opacity="0.3" />
    <circle cx="-140" cy="40" r="6" fill="#5AC8FA" fill-opacity="0.3" />
    <circle cx="20" cy="20" r="8" fill="#0071E3" fill-opacity="0.4" />
    <circle cx="-30" cy="-30" r="4" fill="#7D5CFF" fill-opacity="0.3" />
    <circle cx="120" cy="40" r="5" fill="#5AC8FA" fill-opacity="0.3" />
    <circle cx="-50" cy="50" r="6" fill="#0071E3" fill-opacity="0.4" />

    <!-- Small floating glass-like panels -->
    <!-- Panel 1 (Dashboard) -->
    <g transform="translate(-160, -20)">
      <rect x="0" y="0" width="130" height="85" rx="12" fill="#FFFFFF" fill-opacity="0.6" stroke="#D2D2D7" stroke-width="1" stroke-opacity="0.5" filter="url(#glass)"/>
      <rect x="15" y="20" width="40" height="4" rx="2" fill="#D2D2D7" />
      <rect x="15" y="32" width="70" height="4" rx="2" fill="#D2D2D7" />
      <rect x="15" y="44" width="90" height="4" rx="2" fill="#D2D2D7" />
      <rect x="15" y="56" width="60" height="4" rx="2" fill="#D2D2D7" />
    </g>

    <!-- Panel 2 -->
    <g transform="translate(60, -140)">
      <rect x="0" y="0" width="90" height="60" rx="12" fill="#FFFFFF" fill-opacity="0.6" stroke="#D2D2D7" stroke-width="1" stroke-opacity="0.5" filter="url(#glass)"/>
      <rect x="12" y="16" width="30" height="3" rx="1.5" fill="#D2D2D7" />
      <rect x="12" y="28" width="50" height="3" rx="1.5" fill="#D2D2D7" />
      <rect x="12" y="40" width="40" height="3" rx="1.5" fill="#D2D2D7" />
    </g>

    <!-- Panel 3 -->
    <g transform="translate(60, 60)">
      <rect x="0" y="0" width="100" height="70" rx="12" fill="#FFFFFF" fill-opacity="0.6" stroke="#D2D2D7" stroke-width="1" stroke-opacity="0.5" filter="url(#glass)"/>
      <rect x="15" y="20" width="35" height="3" rx="1.5" fill="#D2D2D7" />
      <rect x="15" y="32" width="60" height="3" rx="1.5" fill="#D2D2D7" />
      <rect x="15" y="44" width="70" height="3" rx="1.5" fill="#D2D2D7" />
    </g>
  </g>
</svg>
