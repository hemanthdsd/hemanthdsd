<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 240" width="900" height="240">
<style>
  .bg { fill: transparent; }
  .border { stroke: #d0d7de; stroke-width: 1; fill: none; }
  .text-primary { fill: #24292f; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
  .text-secondary { fill: #57606a; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
  .accent-blue { stroke: #0969da; fill: none; }
  .accent-purple { stroke: #8250df; fill: none; }
  .fill-blue { fill: #0969da; opacity: 0.1; }
  .fill-purple { fill: #8250df; opacity: 0.1; }
  
  @media (prefers-color-scheme: dark) {
    .border { stroke: #30363d; }
    .text-primary { fill: #c9d1d9; }
    .text-secondary { fill: #8b949e; }
    .accent-blue { stroke: #58a6ff; }
    .accent-purple { stroke: #bc8cff; }
    .fill-blue { fill: #58a6ff; opacity: 0.15; }
    .fill-purple { fill: #bc8cff; opacity: 0.15; }
  }
</style>
<rect width="900" height="240" class="bg"/>
<g transform="translate(40, 80)">
  <text class="text-primary" font-size="24" font-weight="bold">Sai Durga Hemanth Davuloori</text>
  <text class="text-secondary" font-size="16" y="30">AI Systems · Full-Stack Engineering · Data Products</text>
  <text class="text-secondary" font-size="14" y="65">Building responsible AI systems and full-stack products that turn</text>
  <text class="text-secondary" font-size="14" y="85">operational complexity into deployable solutions.</text>
</g>

<!-- Right Side Graph -->
<g transform="translate(550, 40)">
  <!-- Connectors -->
  <path d="M 50 80 C 100 80, 100 30, 150 30" class="accent-blue" stroke-width="2"/>
  <path d="M 50 80 C 100 80, 100 130, 150 130" class="accent-purple" stroke-width="2"/>
  <path d="M 150 30 C 200 30, 200 80, 250 80" class="accent-blue" stroke-width="2"/>
  <path d="M 150 130 C 200 130, 200 80, 250 80" class="accent-purple" stroke-width="2"/>
  
  <!-- Nodes -->
  <circle cx="50" cy="80" r="15" class="fill-blue border"/>
  <circle cx="50" cy="80" r="6" class="accent-blue" fill="currentColor"/>
  
  <circle cx="150" cy="30" r="20" class="fill-purple border"/>
  <rect x="140" y="20" width="20" height="20" rx="4" class="accent-purple"/>
  
  <circle cx="150" cy="130" r="20" class="fill-blue border"/>
  <polygon points="150,115 165,135 135,135" class="accent-blue"/>
  
  <circle cx="250" cy="80" r="25" class="fill-purple border"/>
  <circle cx="250" cy="80" r="10" class="accent-purple" fill="currentColor"/>
</g>
</svg>
