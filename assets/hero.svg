<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 600">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5e5ce6" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="panel-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1c1c1e" stop-opacity="0.5" />
      <stop offset="100%" stop-color="#1c1c1e" stop-opacity="0.2" />
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="30" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1400" height="600" fill="#000000" />

  <!-- LEFT SIDE -->
  <g font-family="Arial, Helvetica, sans-serif">
    <text x="100" y="160" font-size="14" font-weight="600" fill="#86868B" letter-spacing="2">SAI DURGA HEMANTH DAVULOORI</text>
    
    <text x="100" y="240" font-size="64" font-weight="700" fill="#FFFFFF">AI systems.</text>
    <text x="100" y="310" font-size="64" font-weight="700" fill="#FFFFFF">Full-stack products.</text>
    <text x="100" y="380" font-size="64" font-weight="700" fill="#FFFFFF">Useful intelligence.</text>
    
    <text x="100" y="440" font-size="20" font-weight="400" fill="#86868B">I turn complex operational problems into</text>
    <text x="100" y="470" font-size="20" font-weight="400" fill="#86868B">explainable, deployable products.</text>
  </g>

  <!-- RIGHT SIDE -->
  <g transform="translate(1000, 300)">
    <!-- Glow -->
    <circle cx="0" cy="0" r="250" fill="url(#glow)" />
    
    <!-- Glass Panels -->
    <!-- Panel 1 -->
    <g transform="rotate(-15) translate(-100, -80)">
      <rect x="0" y="0" width="180" height="120" rx="12" fill="url(#panel-grad)" stroke="#333336" stroke-width="1" stroke-opacity="0.6" />
      <path d="M 20 60 Q 60 20 100 80 T 160 50" fill="none" stroke="#2997ff" stroke-width="2" stroke-opacity="0.8" />
      <circle cx="20" cy="60" r="3" fill="#FFFFFF" opacity="0.9" />
      <circle cx="160" cy="50" r="3" fill="#FFFFFF" opacity="0.9" />
    </g>
    
    <!-- Panel 2 -->
    <g transform="rotate(10) translate(-40, 0)">
      <rect x="0" y="0" width="160" height="140" rx="12" fill="url(#panel-grad)" stroke="#333336" stroke-width="1" stroke-opacity="0.6" />
      <path d="M 20 100 C 60 100, 80 40, 140 40" fill="none" stroke="#5e5ce6" stroke-width="2" stroke-opacity="0.8" />
      <circle cx="140" cy="40" r="3" fill="#FFFFFF" opacity="0.9" />
      <circle cx="80" cy="70" r="2" fill="#FFFFFF" opacity="0.5" />
    </g>

    <!-- Panel 3 -->
    <g transform="rotate(5) translate(60, -110)">
      <rect x="0" y="0" width="140" height="180" rx="12" fill="url(#panel-grad)" stroke="#333336" stroke-width="1" stroke-opacity="0.6" />
      <path d="M 30 140 L 70 80 L 50 40 L 110 30" fill="none" stroke="#2997ff" stroke-width="2" stroke-opacity="0.6" />
      <circle cx="110" cy="30" r="3" fill="#FFFFFF" opacity="0.9" />
      <circle cx="70" cy="80" r="3" fill="#FFFFFF" opacity="0.9" />
    </g>
  </g>
</svg>
