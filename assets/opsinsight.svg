<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" width="1200" height="340">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#768079" stroke-width="0.5" stroke-opacity="0.2"/>
    </pattern>
    <pattern id="dot-grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#768079" fill-opacity="0.3"/>
    </pattern>
    <clipPath id="card-clip">
      <rect width="1200" height="340" />
    </clipPath>
  </defs>

  <rect width="1200" height="340" fill="#0F1923" />
  <rect width="1200" height="340" fill="url(#grid)" />
  <rect width="1200" height="340" fill="url(#dot-grid)" opacity="0.5" />
  <rect width="1200" height="340" fill="none" stroke="#2a3a4a" stroke-width="2" />
  
  <!-- Red left edge strip -->
  <rect x="0" y="0" width="4" height="340" fill="#FF4655" />

  <!-- Corner Brackets -->
  <path d="M 1180 10 L 1190 10 L 1190 20" fill="none" stroke="#768079" stroke-width="2" />
  <path d="M 1180 330 L 1190 330 L 1190 320" fill="none" stroke="#768079" stroke-width="2" />
  <path d="M 10 330 L 20 330 L 20 320" fill="none" stroke="#768079" stroke-width="2" />
  <path d="M 10 10 L 20 10 L 20 20" fill="none" stroke="#768079" stroke-width="2" />

  <!-- Small coordinate text -->
  <text x="1175" y="30" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#768079" text-anchor="end" letter-spacing="2">MFG.SYS</text>
  
  <!-- Dashed separator -->
  <line x1="720" y1="20" x2="720" y2="320" stroke="#768079" stroke-width="1" stroke-dasharray="4,4" opacity="0.5" />

  <!-- LEFT SECTION -->
  <g transform="translate(60, 40)">
    <!-- Project code -->
    <rect x="0" y="0" width="8" height="8" fill="#FF4655" />
    <text x="16" y="8" font-family="Courier New, monospace, sans-serif" font-size="12" fill="#FF4655" letter-spacing="1">OPS-001</text>
    
    <!-- Title & Subtitle -->
    <text x="0" y="60" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="bold" fill="#ECE8E1" letter-spacing="1">OPSINSIGHT AI</text>
    <text x="2" y="90" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#768079" letter-spacing="3">REGULATED MANUFACTURING INTELLIGENCE</text>
    
    <!-- Description -->
    <g transform="translate(2, 130)" font-family="Arial, Helvetica, sans-serif" font-size="15" fill="#768079">
      <text x="0" y="0">Controlled AI investigations with evidence citations,</text>
      <text x="0" y="24">deterministic fallback, and human-in-the-loop review</text>
      <text x="0" y="48">for regulated production environments.</text>
    </g>

    <!-- Tech Stack -->
    <g transform="translate(0, 220)">
      <!-- Angular 18 -->
      <path d="M 0 0 L 80 0 L 88 12 L 80 24 L 0 24 Z" fill="#1a2332" stroke="#2a3a4a" stroke-width="1"/>
      <text x="40" y="16" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ECE8E1" text-anchor="middle">Angular 18</text>
      
      <!-- NestJS -->
      <path d="M 100 0 L 160 0 L 168 12 L 160 24 L 100 24 Z" fill="#1a2332" stroke="#2a3a4a" stroke-width="1"/>
      <text x="130" y="16" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ECE8E1" text-anchor="middle">NestJS</text>
      
      <!-- PostgreSQL -->
      <path d="M 180 0 L 260 0 L 268 12 L 260 24 L 180 24 Z" fill="#1a2332" stroke="#2a3a4a" stroke-width="1"/>
      <text x="220" y="16" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ECE8E1" text-anchor="middle">PostgreSQL</text>
      
      <!-- Gemini -->
      <path d="M 280 0 L 340 0 L 348 12 L 340 24 L 280 24 Z" fill="#1a2332" stroke="#2a3a4a" stroke-width="1"/>
      <text x="310" y="16" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ECE8E1" text-anchor="middle">Gemini</text>
      
      <!-- pgvector -->
      <path d="M 360 0 L 430 0 L 438 12 L 430 24 L 360 24 Z" fill="#1a2332" stroke="#2a3a4a" stroke-width="1"/>
      <text x="395" y="16" font-family="Arial, Helvetica, sans-serif" font-size="11" fill="#ECE8E1" text-anchor="middle">pgvector</text>
    </g>

    <!-- Classification Label -->
    <text x="2" y="280" font-family="Arial, Helvetica, sans-serif" font-size="10" fill="#BD3944" letter-spacing="2" font-weight="bold">FLAGSHIP // FULL-STACK</text>
  </g>

  <!-- RIGHT SECTION (Abstract Dashboard/Data-flow) -->
  <g transform="translate(760, 40)">
    <!-- Dashboard Frame -->
    <rect x="0" y="20" width="380" height="240" fill="#0F1923" stroke="#2a3a4a" stroke-width="1.5" />
    <line x1="0" y1="50" x2="380" y2="50" stroke="#2a3a4a" stroke-width="1.5" />
    <circle cx="15" cy="35" r="3" fill="#FF4655" />
    <circle cx="27" cy="35" r="3" fill="#768079" />
    <circle cx="39" cy="35" r="3" fill="#768079" />

    <!-- Bar chart shapes -->
    <rect x="20" y="70" width="140" height="10" fill="#1a2332" />
    <rect x="20" y="70" width="110" height="10" fill="#768079" />
    
    <rect x="20" y="90" width="140" height="10" fill="#1a2332" />
    <rect x="20" y="90" width="85" height="10" fill="#FF4655" />
    
    <rect x="20" y="110" width="140" height="10" fill="#1a2332" />
    <rect x="20" y="110" width="125" height="10" fill="#768079" />

    <rect x="20" y="130" width="140" height="10" fill="#1a2332" />
    <rect x="20" y="130" width="60" height="10" fill="#22D3EE" />

    <!-- Connected data flow nodes -->
    <path d="M 180 180 L 220 120 L 260 160 L 300 90 L 340 130" fill="none" stroke="#768079" stroke-width="2" />
    <path d="M 180 180 L 220 120 L 260 160" fill="none" stroke="#FF4655" stroke-width="2" />
    
    <!-- Nodes -->
    <circle cx="180" cy="180" r="4" fill="#0F1923" stroke="#768079" stroke-width="2" />
    <circle cx="220" cy="120" r="4" fill="#0F1923" stroke="#FF4655" stroke-width="2" />
    <circle cx="260" cy="160" r="4" fill="#0F1923" stroke="#FF4655" stroke-width="2" />
    <circle cx="300" cy="90" r="5" fill="#22D3EE" />
    <circle cx="340" cy="130" r="4" fill="#0F1923" stroke="#768079" stroke-width="2" />
    
    <!-- Data points/labels -->
    <rect x="290" y="65" width="20" height="12" fill="#1a2332" stroke="#22D3EE" stroke-width="1" />
    <text x="300" y="74" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#22D3EE" text-anchor="middle">99%</text>

    <!-- Radial Element -->
    <g transform="translate(80, 200)">
      <circle cx="0" cy="0" r="40" fill="none" stroke="#1a2332" stroke-width="8" />
      <path d="M 0 -40 A 40 40 0 1 1 -40 0" fill="none" stroke="#FF4655" stroke-width="8" stroke-linecap="butt" />
      <text x="0" y="4" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ECE8E1" text-anchor="middle" font-weight="bold">75%</text>
      <text x="0" y="16" font-family="Arial, Helvetica, sans-serif" font-size="8" fill="#768079" text-anchor="middle">OEE</text>
    </g>
    
    <!-- Small tech detail -->
    <g transform="translate(180, 210)">
      <rect x="0" y="0" width="160" height="30" fill="#1a2332" stroke="#2a3a4a" stroke-width="1" />
      <line x1="0" y1="0" x2="4" y2="4" stroke="#768079" stroke-width="1" />
      <line x1="160" y1="30" x2="156" y2="26" stroke="#768079" stroke-width="1" />
      <text x="10" y="12" font-family="Courier New, monospace, sans-serif" font-size="9" fill="#768079">SYS_STATUS: NOMINAL</text>
      <text x="10" y="24" font-family="Courier New, monospace, sans-serif" font-size="9" fill="#768079">AI_CONF: HIGH</text>
      <circle cx="145" cy="15" r="3" fill="#22D3EE" />
    </g>
  </g>
</svg>
