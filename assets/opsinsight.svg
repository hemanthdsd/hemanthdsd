<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 520" width="1400" height="520">
  <defs>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.6"/>
    </filter>
    <filter id="shadow-sm" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1400" height="520" fill="#0B0B0F" />

  <!-- TOP SECTION -->
  <g text-anchor="middle" font-family="Arial, Helvetica, sans-serif">
    <text x="700" y="55" font-size="11" fill="#86868B" letter-spacing="2" font-weight="600">FEATURED PROJECT</text>
    
    <text x="700" y="105" font-size="42" fill="#FFFFFF" font-weight="700">Manufacturing intelligence,</text>
    <text x="700" y="155" font-size="42" fill="#FFFFFF" font-weight="700">with evidence built in.</text>
    
    <text x="700" y="195" font-size="16" fill="#86868B">An AI-assisted deviation and yield intelligence platform</text>
    <text x="700" y="220" font-size="16" fill="#86868B">designed for controlled, regulated manufacturing workflows.</text>
  </g>

  <!-- MIDDLE SECTION (Abstracted Dashboard) -->
  
  <!-- Left Side Panel -->
  <g transform="translate(160, 260)">
    <rect width="160" height="140" rx="12" fill="#1a1a1f" stroke="#2a2a2f" stroke-width="1.5" filter="url(#shadow-sm)"/>
    
    <!-- Fake Metric Rows -->
    <rect x="20" y="25" width="45" height="6" fill="#86868B" opacity="0.5" rx="3"/>
    <rect x="20" y="38" width="80" height="10" fill="#FFFFFF" opacity="0.8" rx="3"/>
    
    <rect x="20" y="65" width="60" height="6" fill="#86868B" opacity="0.5" rx="3"/>
    <rect x="20" y="78" width="100" height="10" fill="#FFFFFF" opacity="0.8" rx="3"/>
    
    <rect x="20" y="105" width="40" height="6" fill="#86868B" opacity="0.5" rx="3"/>
    <rect x="20" y="118" width="70" height="10" fill="#FFFFFF" opacity="0.8" rx="3"/>
  </g>

  <!-- Right Side Panel -->
  <g transform="translate(1080, 260)">
    <rect width="160" height="140" rx="12" fill="#1a1a1f" stroke="#2a2a2f" stroke-width="1.5" filter="url(#shadow-sm)"/>
    
    <!-- Circular Progress -->
    <circle cx="80" cy="55" r="28" stroke="#2a2a2f" stroke-width="5" fill="none"/>
    <path d="M 80 27 A 28 28 0 1 1 52 55" stroke="#0071E3" stroke-width="5" fill="none" stroke-linecap="round"/>
    <text x="80" y="60" font-size="14" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-weight="bold" text-anchor="middle">75%</text>
    
    <!-- Fake Text Lines -->
    <rect x="30" y="100" width="100" height="6" fill="#86868B" opacity="0.5" rx="3"/>
    <rect x="50" y="115" width="60" height="6" fill="#86868B" opacity="0.5" rx="3"/>
  </g>

  <!-- Main Central Panel -->
  <g transform="translate(340, 240)">
    <rect width="720" height="180" rx="16" fill="#1a1a1f" stroke="#2a2a2f" stroke-width="1.5" filter="url(#shadow)"/>
    
    <!-- Horizontal Grid Lines -->
    <path d="M 40 35 L 680 35 M 40 70 L 680 70 M 40 105 L 680 105 M 40 140 L 680 140" stroke="#2a2a2f" stroke-width="1"/>
    
    <!-- Bar Chart (Left Area) -->
    <rect x="70" y="80" width="35" height="60" fill="#7D5CFF" opacity="0.6" rx="4"/>
    <rect x="130" y="50" width="35" height="90" fill="#7D5CFF" opacity="0.6" rx="4"/>
    <rect x="190" y="100" width="35" height="40" fill="#7D5CFF" opacity="0.6" rx="4"/>
    <rect x="250" y="65" width="35" height="75" fill="#7D5CFF" opacity="0.6" rx="4"/>
    <rect x="310" y="35" width="35" height="105" fill="#7D5CFF" opacity="0.6" rx="4"/>
    
    <!-- Smooth Curved Line Chart (Right Area) -->
    <path d="M 390 110 C 440 70, 500 130, 550 50 S 610 90, 670 30" stroke="#0071E3" stroke-width="3" fill="none" stroke-linecap="round"/>
    
    <!-- Data Points on Line Chart -->
    <circle cx="390" cy="110" r="4" fill="#0071E3"/>
    <circle cx="470" cy="100" r="4" fill="#0071E3"/>
    <circle cx="550" cy="50" r="4" fill="#0071E3"/>
    <circle cx="615" cy="65" r="4" fill="#0071E3"/>
    <circle cx="670" cy="30" r="4" fill="#0071E3"/>
  </g>

  <!-- BOTTOM SECTION -->
  <g transform="translate(0, 445)" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#86868B">
    <!-- Pill 1: Evidence-cited investigations -->
    <rect x="282" y="0" width="200" height="32" rx="16" fill="none" stroke="#2a2a2f" stroke-width="1.5"/>
    <text x="382" y="20" text-anchor="middle">Evidence-cited investigations</text>

    <!-- Pill 2: Human-in-the-loop review -->
    <rect x="507" y="0" width="180" height="32" rx="16" fill="none" stroke="#2a2a2f" stroke-width="1.5"/>
    <text x="597" y="20" text-anchor="middle">Human-in-the-loop review</text>

    <!-- Pill 3: Deterministic fallback -->
    <rect x="712" y="0" width="160" height="32" rx="16" fill="none" stroke="#2a2a2f" stroke-width="1.5"/>
    <text x="792" y="20" text-anchor="middle">Deterministic fallback</text>

    <!-- Pill 4: Manufacturing KPI intelligence -->
    <rect x="897" y="0" width="220" height="32" rx="16" fill="none" stroke="#2a2a2f" stroke-width="1.5"/>
    <text x="1007" y="20" text-anchor="middle">Manufacturing KPI intelligence</text>
  </g>

  <!-- Technology Stack Line -->
  <text x="700" y="500" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#86868B" letter-spacing="0.5" text-anchor="middle">Angular 18 · NestJS · PostgreSQL · Gemini · pgvector</text>

</svg>
