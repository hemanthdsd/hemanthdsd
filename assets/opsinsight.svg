<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 350" width="900" height="350">
<style>
  .bg { fill: transparent; }
  .bg-solid { fill: #ffffff; }
  .border { stroke: #d0d7de; stroke-width: 1; fill: none; }
  .text-primary { fill: #24292f; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
  .text-secondary { fill: #57606a; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
  .accent-blue { stroke: #0969da; fill: none; }
  .accent-purple { stroke: #8250df; fill: none; }
  .fill-blue { fill: #0969da; opacity: 0.1; }
  .fill-purple { fill: #8250df; opacity: 0.1; }
  
  @media (prefers-color-scheme: dark) {
    .bg-solid { fill: #0d1117; }
    .border { stroke: #30363d; }
    .text-primary { fill: #c9d1d9; }
    .text-secondary { fill: #8b949e; }
    .accent-blue { stroke: #58a6ff; }
    .accent-purple { stroke: #bc8cff; }
    .fill-blue { fill: #58a6ff; opacity: 0.15; }
    .fill-purple { fill: #bc8cff; opacity: 0.15; }
  }
</style>
<rect width="900" height="350" class="bg"/>

<!-- Main Dashboard Window -->
<rect x="100" y="30" width="700" height="290" rx="8" class="bg-solid border"/>
<!-- Header bar -->
<path d="M 100 70 L 800 70" class="border"/>
<!-- Mac buttons -->
<circle cx="125" cy="50" r="5" class="border"/>
<circle cx="145" cy="50" r="5" class="border"/>
<circle cx="165" cy="50" r="5" class="border"/>

<!-- Sidebar -->
<rect x="100" y="70" width="150" height="250" class="fill-blue"/>
<path d="M 250 70 L 250 320" class="border"/>

<!-- Sidebar Items -->
<rect x="110" y="85" width="120" height="20" rx="4" class="fill-blue"/>
<rect x="110" y="115" width="80" height="10" rx="2" class="border"/>
<rect x="110" y="135" width="100" height="10" rx="2" class="border"/>
<rect x="110" y="155" width="90" height="10" rx="2" class="border"/>

<!-- Main Content Area -->
<text x="270" y="100" font-size="16" class="text-primary" font-weight="bold">Yield Analytics</text>

<!-- Data Cards -->
<rect x="270" y="120" width="150" height="70" rx="6" class="border bg-solid"/>
<text x="285" y="145" font-size="12" class="text-secondary">Process Deviations</text>
<text x="285" y="170" font-size="20" class="text-primary">12.4%</text>

<rect x="440" y="120" width="150" height="70" rx="6" class="border bg-solid"/>
<text x="455" y="145" font-size="12" class="text-secondary">Production Yield</text>
<text x="455" y="170" font-size="20" class="text-primary">98.2%</text>

<rect x="610" y="120" width="150" height="70" rx="6" class="border bg-solid"/>
<text x="625" y="145" font-size="12" class="text-secondary">Active Sensors</text>
<text x="625" y="170" font-size="20" class="text-primary">4,092</text>

<!-- Line Chart -->
<rect x="270" y="210" width="490" height="90" rx="6" class="border bg-solid"/>
<path d="M 280 280 Q 320 220, 380 250 T 480 230 T 580 270 T 740 220" class="accent-blue" stroke-width="2"/>
<path d="M 280 280 Q 320 220, 380 250 T 480 230 T 580 270 T 740 220 L 740 300 L 280 300 Z" class="fill-blue" stroke="none"/>

<!-- Secondary Line -->
<path d="M 280 290 Q 350 260, 420 280 T 560 260 T 740 250" class="accent-purple" stroke-width="1.5" stroke-dasharray="4,4"/>
</svg>
