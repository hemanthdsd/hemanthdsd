<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 520">
  <defs>
    <linearGradient id="chart-fill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2997ff" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#2997ff" stop-opacity="0" />
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" />
      <feOffset dx="0" dy="10" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.3" />
      </feComponentTransfer>
      <feMerge> 
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1400" height="520" fill="#000000" />

  <!-- TOP (Centered) -->
  <g font-family="Arial, Helvetica, sans-serif" text-anchor="middle">
    <text x="700" y="45" font-size="11" font-weight="600" fill="#86868B" letter-spacing="2">FEATURED PROJECT</text>
    
    <text x="700" y="95" font-size="48" font-weight="700" fill="#FFFFFF">Manufacturing intelligence,</text>
    <text x="700" y="145" font-size="48" font-weight="700" fill="#FFFFFF">with evidence built in.</text>
    
    <text x="700" y="185" font-size="18" font-weight="400" fill="#86868B">An AI-assisted deviation and yield intelligence platform</text>
    <text x="700" y="210" font-size="18" font-weight="400" fill="#86868B">designed for controlled, regulated manufacturing workflows.</text>
  </g>

  <!-- MIDDLE (Dashboard Illustration) -->
  <g transform="translate(700, 330)">
    
    <!-- Left Side Panel -->
    <g transform="translate(-400, -60)" filter="url(#shadow)">
      <rect x="-80" y="0" width="140" height="120" rx="12" fill="#111111" stroke="#333336" stroke-width="1.5" />
      <rect x="-60" y="20" width="60" height="10" rx="3" fill="#333336" />
      <rect x="-60" y="40" width="100" height="60" rx="6" fill="#1c1c1e" />
      <rect x="-45" y="55" width="70" height="6" rx="2" fill="#5e5ce6" />
      <rect x="-45" y="70" width="50" height="6" rx="2" fill="#2997ff" />
      <rect x="-45" y="85" width="60" height="6" rx="2" fill="#86868B" />
    </g>

    <!-- Right Side Panel -->
    <g transform="translate(340, -60)" filter="url(#shadow)">
      <rect x="-60" y="0" width="140" height="120" rx="12" fill="#111111" stroke="#333336" stroke-width="1.5" />
      <rect x="-40" y="20" width="60" height="10" rx="3" fill="#333336" />
      <circle cx="-10" cy="65" r="25" fill="none" stroke="#333336" stroke-width="8" />
      <path d="M -10 40 A 25 25 0 0 1 15 65" fill="none" stroke="#2997ff" stroke-width="8" stroke-linecap="round" />
    </g>

    <!-- Main Panel -->
    <g transform="translate(-300, -80)" filter="url(#shadow)">
      <rect x="0" y="0" width="600" height="160" rx="16" fill="#111111" stroke="#333336" stroke-width="1.5" />
      
      <!-- Chart inside Main Panel -->
      <g transform="translate(40, 20)">
        <rect x="0" y="0" width="100" height="12" rx="4" fill="#333336" />
        <rect x="0" y="20" width="60" height="8" rx="4" fill="#1c1c1e" />
        
        <!-- Gradient fill under chart -->
        <path d="M 0 100 Q 100 40 250 80 T 520 20 L 520 120 L 0 120 Z" fill="url(#chart-fill)" />
        <!-- Chart line -->
        <path d="M 0 100 Q 100 40 250 80 T 520 20" fill="none" stroke="#2997ff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
        
        <!-- Data points -->
        <circle cx="250" cy="80" r="4" fill="#111111" stroke="#2997ff" stroke-width="2" />
        <circle cx="520" cy="20" r="4" fill="#111111" stroke="#5e5ce6" stroke-width="2" />
      </g>
    </g>
  </g>

  <!-- BOTTOM -->
  <g font-family="Arial, Helvetica, sans-serif" text-anchor="middle">
    <!-- Capabilities Pills -->
    <!-- Center the group at x=700 -->
    <g transform="translate(700, 440)">
      <!-- Pill 1 -->
      <rect x="-355" y="0" width="190" height="30" rx="15" fill="none" stroke="#333336" stroke-width="1" />
      <text x="-260" y="19" font-size="12" font-weight="400" fill="#86868B">Evidence-cited investigations</text>

      <!-- Pill 2 -->
      <rect x="-150" y="0" width="170" height="30" rx="15" fill="none" stroke="#333336" stroke-width="1" />
      <text x="-65" y="19" font-size="12" font-weight="400" fill="#86868B">Human-in-the-loop review</text>

      <!-- Pill 3 -->
      <rect x="35" y="0" width="150" height="30" rx="15" fill="none" stroke="#333336" stroke-width="1" />
      <text x="110" y="19" font-size="12" font-weight="400" fill="#86868B">Deterministic fallback</text>

      <!-- Pill 4 -->
      <rect x="200" y="0" width="200" height="30" rx="15" fill="none" stroke="#333336" stroke-width="1" />
      <text x="300" y="19" font-size="12" font-weight="400" fill="#86868B">Manufacturing KPI intelligence</text>
    </g>

    <!-- Tech Stack -->
    <text x="700" y="500" font-size="13" font-weight="400" fill="#86868B">Angular 18 · NestJS · PostgreSQL · Gemini · pgvector</text>
  </g>

</svg>
