<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 350">
<style>
  .bg { fill: transparent; }
  .border { stroke: #d0d7de; stroke-width: 1; fill: none; }
  .text-primary { fill: #24292f; font-family: -apple-system, sans-serif; font-size: 14px; }
  .text-secondary { fill: #57606a; font-family: -apple-system, sans-serif; font-size: 12px; }
  .text-bold { font-weight: 600; }
  .accent-blue { stroke: #0969da; fill: none; }
  .accent-purple { stroke: #8250df; fill: none; }
  .fill-blue { fill: #0969da; opacity: 0.15; }
  .fill-purple { fill: #8250df; opacity: 0.15; }
  .accent-red { stroke: #cf222e; fill: none; }
  .fill-red { fill: #cf222e; opacity: 0.15; }
  
  @media (prefers-color-scheme: dark) {
    .border { stroke: #30363d; }
    .text-primary { fill: #c9d1d9; }
    .text-secondary { fill: #8b949e; }
    .accent-blue { stroke: #58a6ff; }
    .accent-purple { stroke: #bc8cff; }
    .fill-blue { fill: #58a6ff; opacity: 0.2; }
    .fill-purple { fill: #bc8cff; opacity: 0.2; }
    .accent-red { stroke: #ff7b72; }
    .fill-red { fill: #ff7b72; opacity: 0.2; }
  }
</style>

<!-- Main application window -->
<rect x="50" y="20" width="800" height="310" rx="8" class="border" />

<!-- Sidebar -->
<rect x="50" y="20" width="60" height="310" rx="8" class="border" />
<line x1="60" y1="50" x2="100" y2="50" class="border" />
<line x1="60" y1="70" x2="100" y2="70" class="border" />
<line x1="60" y1="90" x2="100" y2="90" class="border" />
<line x1="60" y1="110" x2="100" y2="110" class="border" />

<!-- Top header -->
<text x="130" y="50" class="text-primary text-bold" font-size="18">OpsInsight AI</text>
<line x1="110" y1="70" x2="850" y2="70" class="border" />

<!-- Main area - Chart -->
<rect x="130" y="90" width="450" height="220" rx="4" class="border" />
<text x="140" y="115" class="text-secondary">Yield Trend</text>

<!-- Chart axes -->
<line x1="150" y1="280" x2="560" y2="280" class="border" />
<line x1="150" y1="130" x2="150" y2="280" class="border" />

<!-- Line chart with dip -->
<path d="M 150 180 L 220 170 L 290 190 L 360 160 L 410 260 L 460 170 L 530 150" class="accent-blue" stroke-width="2" fill="none" />

<!-- Red circle on dip -->
<circle cx="410" cy="260" r="16" class="accent-red" stroke-width="2" />
<text x="435" y="265" class="text-secondary accent-red" style="stroke: none;">Deviation Detected</text>

<!-- Side panel -->
<rect x="600" y="90" width="230" height="220" rx="4" class="border fill-purple" />
<text x="615" y="115" class="text-primary text-bold">Gemini AI Root Cause Analysis</text>
<line x1="615" y1="130" x2="815" y2="130" class="border" />

<!-- Mock text lines -->
<rect x="615" y="145" width="200" height="6" rx="3" class="text-secondary" style="fill: #8b949e; opacity: 0.5;" />
<rect x="615" y="160" width="180" height="6" rx="3" class="text-secondary" style="fill: #8b949e; opacity: 0.5;" />
<rect x="615" y="175" width="190" height="6" rx="3" class="text-secondary" style="fill: #8b949e; opacity: 0.5;" />

<rect x="615" y="195" width="160" height="6" rx="3" class="text-secondary" style="fill: #8b949e; opacity: 0.5;" />
<rect x="615" y="210" width="175" height="6" rx="3" class="text-secondary" style="fill: #8b949e; opacity: 0.5;" />

<!-- KPI box -->
<rect x="615" y="240" width="120" height="30" rx="4" class="border accent-red fill-red" />
<text x="625" y="260" class="text-primary text-bold">Yield Risk: High</text>

</svg>
