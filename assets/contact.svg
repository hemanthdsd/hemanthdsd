<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 320" width="100%" height="100%">
  <!-- Background -->
  <rect width="1400" height="320" fill="#000000"/>
  
  <defs>
    <!-- Radial gradient for headline -->
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5e5ce6" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#2997ff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Glow Background -->
  <rect x="400" y="10" width="600" height="200" fill="url(#glow2)"/>

  <g font-family="Arial, Helvetica, sans-serif" text-anchor="middle">
    <text x="700" y="100" fill="#FFFFFF" font-size="56" font-weight="700">Let's build something useful.</text>
    
    <text x="700" y="140" fill="#86868B" font-size="18">I'm interested in AI, business analysis, full-stack</text>
    <text x="700" y="165" fill="#86868B" font-size="18">engineering and data-product opportunities.</text>
    
    <!-- Buttons -->
    <!-- Button 1 -->
    <g transform="translate(540, 210)">
      <rect x="0" y="0" width="180" height="48" rx="24" fill="#2997ff"/>
      <text x="90" y="29" fill="#FFFFFF" font-size="15" font-weight="600" text-anchor="middle">Connect on LinkedIn</text>
    </g>
    
    <!-- Button 2 -->
    <g transform="translate(740, 210)">
      <rect x="0" y="0" width="160" height="48" rx="24" fill="#111111" stroke="#333336" stroke-width="2"/>
      <text x="80" y="29" fill="#FFFFFF" font-size="15" font-weight="600" text-anchor="middle">Send an email</text>
    </g>
  </g>
</svg>
