<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 320" width="1400" height="320">
    <style>
        text { font-family: Arial, Helvetica, sans-serif; }
        .head { font-size: 46px; font-weight: 700; fill: #FFFFFF; }
        .sup { font-size: 16px; fill: #86868B; }
        .btn { font-size: 14px; font-weight: 600; fill: #FFFFFF; }
    </style>
    
    <rect width="1400" height="320" fill="#0B0B0F" />
    
    <defs>
        <radialGradient id="glow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#7D5CFF" stop-opacity="0.04" />
            <stop offset="100%" stop-color="#7D5CFF" stop-opacity="0" />
        </radialGradient>
    </defs>
    
    <circle cx="700" cy="100" r="300" fill="url(#glow)" />
    
    <text x="700" y="100" class="head" text-anchor="middle">Let's build something useful.</text>
    
    <text x="700" y="140" class="sup" text-anchor="middle">I'm interested in AI, business analysis, full-stack</text>
    <text x="700" y="164" class="sup" text-anchor="middle">engineering and data-product opportunities.</text>
    
    <g transform="translate(480, 204)">
        <rect x="0" y="0" width="200" height="48" rx="24" fill="#0071E3" />
        <text x="100" y="29" class="btn" text-anchor="middle">Connect on LinkedIn</text>
    </g>
    
    <g transform="translate(720, 204)">
        <rect x="0" y="0" width="180" height="48" rx="24" fill="transparent" stroke="#86868B" stroke-width="1.5" />
        <text x="90" y="29" class="btn" text-anchor="middle">Send an email</text>
    </g>
</svg>
