<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 200" width="1400" height="200">
    <style>
        text {
            font-family: Arial, Helvetica, sans-serif;
        }
        .heading {
            font-size: 13px;
            fill: #6E6E73;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .pill-text {
            font-size: 13px;
            font-weight: 600;
            fill: #0B0B0F;
        }
    </style>
    <rect width="1400" height="200" fill="#FFFFFF" />
    
    <text x="700" y="50" class="heading" text-anchor="middle">Tools chosen for the problem.</text>
    
    <g transform="translate(0, 80)">
        <g transform="translate(455, 0)">
            <rect x="0" y="0" width="80" height="36" rx="18" fill="none" stroke="#D2D2D7" stroke-width="1"/>
            <text x="40" y="23" class="pill-text" text-anchor="middle">Angular</text>
        </g>
        <g transform="translate(555, 0)">
            <rect x="0" y="0" width="70" height="36" rx="18" fill="none" stroke="#D2D2D7" stroke-width="1"/>
            <text x="35" y="23" class="pill-text" text-anchor="middle">React</text>
        </g>
        <g transform="translate(645, 0)">
            <rect x="0" y="0" width="100" height="36" rx="18" fill="none" stroke="#D2D2D7" stroke-width="1"/>
            <text x="50" y="23" class="pill-text" text-anchor="middle">TypeScript</text>
        </g>
        <g transform="translate(765, 0)">
            <rect x="0" y="0" width="80" height="36" rx="18" fill="none" stroke="#D2D2D7" stroke-width="1"/>
            <text x="40" y="23" class="pill-text" text-anchor="middle">NestJS</text>
        </g>
        <g transform="translate(865, 0)">
            <rect x="0" y="0" width="80" height="36" rx="18" fill="none" stroke="#D2D2D7" stroke-width="1"/>
            <text x="40" y="23" class="pill-text" text-anchor="middle">Electron</text>
        </g>
    </g>

    <g transform="translate(0, 136)">
        <g transform="translate(472.5, 0)">
            <rect x="0" y="0" width="100" height="36" rx="18" fill="none" stroke="#D2D2D7" stroke-width="1"/>
            <text x="50" y="23" class="pill-text" text-anchor="middle">PostgreSQL</text>
        </g>
        <g transform="translate(592.5, 0)">
            <rect x="0" y="0" width="75" height="36" rx="18" fill="none" stroke="#D2D2D7" stroke-width="1"/>
            <text x="37.5" y="23" class="pill-text" text-anchor="middle">Python</text>
        </g>
        <g transform="translate(687.5, 0)">
            <rect x="0" y="0" width="50" height="36" rx="18" fill="none" stroke="#D2D2D7" stroke-width="1"/>
            <text x="25" y="23" class="pill-text" text-anchor="middle">R</text>
        </g>
        <g transform="translate(757.5, 0)">
            <rect x="0" y="0" width="75" height="36" rx="18" fill="none" stroke="#D2D2D7" stroke-width="1"/>
            <text x="37.5" y="23" class="pill-text" text-anchor="middle">Ollama</text>
        </g>
        <g transform="translate(852.5, 0)">
            <rect x="0" y="0" width="75" height="36" rx="18" fill="none" stroke="#D2D2D7" stroke-width="1"/>
            <text x="37.5" y="23" class="pill-text" text-anchor="middle">Docker</text>
        </g>
