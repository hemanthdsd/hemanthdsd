<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 200" width="100%" height="100%">
  <!-- Background -->
  <rect width="1400" height="200" fill="#000000"/>
  
  <g font-family="Arial, Helvetica, sans-serif">
    <text x="700" y="40" fill="#86868B" font-size="13" letter-spacing="1" text-anchor="middle">TOOLS CHOSEN FOR THE PROBLEM.</text>
    
    <!-- Row 1 -->
    <rect x="405" y="70" width="100" height="40" rx="20" fill="#111111" stroke="#333336" stroke-width="1.5"/>
    <text x="455" y="94" fill="#FFFFFF" font-size="13" font-weight="600" text-anchor="middle">Angular</text>
    
    <rect x="525" y="70" width="90" height="40" rx="20" fill="#111111" stroke="#333336" stroke-width="1.5"/>
    <text x="570" y="94" fill="#FFFFFF" font-size="13" font-weight="600" text-anchor="middle">React</text>
    
    <rect x="635" y="70" width="120" height="40" rx="20" fill="#111111" stroke="#333336" stroke-width="1.5"/>
    <text x="695" y="94" fill="#FFFFFF" font-size="13" font-weight="600" text-anchor="middle">TypeScript</text>
    
    <rect x="775" y="70" width="100" height="40" rx="20" fill="#111111" stroke="#333336" stroke-width="1.5"/>
    <text x="825" y="94" fill="#FFFFFF" font-size="13" font-weight="600" text-anchor="middle">NestJS</text>
    
    <rect x="895" y="70" width="100" height="40" rx="20" fill="#111111" stroke="#333336" stroke-width="1.5"/>
    <text x="945" y="94" fill="#FFFFFF" font-size="13" font-weight="600" text-anchor="middle">Electron</text>

    <!-- Row 2 -->
    <rect x="435" y="130" width="120" height="40" rx="20" fill="#111111" stroke="#333336" stroke-width="1.5"/>
