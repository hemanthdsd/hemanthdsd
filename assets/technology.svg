    <rect x="575" y="130" width="90" height="40" rx="20" fill="#111111" stroke="#333336" stroke-width="1.5"/>
    <text x="620" y="154" fill="#FFFFFF" font-size="13" font-weight="600" text-anchor="middle">Python</text>
    
    <rect x="685" y="130" width="60" height="40" rx="20" fill="#111111" stroke="#333336" stroke-width="1.5"/>
    <text x="715" y="154" fill="#FFFFFF" font-size="13" font-weight="600" text-anchor="middle">R</text>

    <rect x="765" y="130" width="90" height="40" rx="20" fill="#111111" stroke="#333336" stroke-width="1.5"/>
