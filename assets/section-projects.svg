    <!-- Thin red line below text -->
    <line x1="420" y1="56" x2="780" y2="56" stroke="#FF4655" stroke-width="2"/>
    
    <!-- Center text -->
    <text x="600" y="46" fill="#ECE8E1" font-size="28" font-weight="bold" letter-spacing="4" text-anchor="middle">SELECTED MISSIONS <tspan fill="#FF4655">// 01</tspan></text>
    
    <!-- Corner crosshairs left -->
