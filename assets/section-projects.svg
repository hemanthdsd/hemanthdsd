<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 80" width="1200" height="80">
  <rect width="1200" height="80" fill="#0F1923"/>
  <g font-family="Arial, Helvetica, sans-serif">
    <!-- Left text -->
    <text x="30" y="45" fill="#768079" font-size="9" font-weight="bold" letter-spacing="1">MISSION.LOG</text>
    
    <!-- Right text -->
    <text x="1170" y="45" fill="#768079" font-size="9" font-weight="bold" letter-spacing="1" text-anchor="end">PRIORITY: HIGH</text>
    
    <!-- Left line -->
