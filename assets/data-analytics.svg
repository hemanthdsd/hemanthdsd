<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 240">
  <defs>
    <style>
      .bg { fill: #0F1923; stroke: #2a3a4a; stroke-width: 1; }
      .accent { fill: #FF4655; }
      .text-code { font-family: Arial, Helvetica, sans-serif; font-size: 12px; fill: #FF4655; font-weight: bold; letter-spacing: 1px; }
      .text-title { font-family: Arial, Helvetica, sans-serif; font-size: 28px; font-weight: bold; fill: #ECE8E1; }
      .text-subtitle { font-family: Arial, Helvetica, sans-serif; font-size: 13px; fill: #768079; letter-spacing: 2px; }
      .text-brief { font-family: Arial, Helvetica, sans-serif; font-size: 13px; fill: #768079; }
      .badge-bg { fill: #1a2332; stroke: #2a3a4a; stroke-width: 1; }
      .badge-text { font-family: Arial, Helvetica, sans-serif; font-size: 12px; fill: #ECE8E1; font-weight: bold; }
      .label-bottom { font-family: Arial, Helvetica, sans-serif; font-size: 11px; fill: #768079; letter-spacing: 1px; text-anchor: end; }
      
      .chart-grid { fill: none; stroke: #768079; stroke-width: 1; opacity: 0.3; stroke-dasharray: 2,4; }
      .chart-bar { fill: #FF4655; opacity: 0.8; }
      .chart-trend { fill: none; stroke: #22D3EE; stroke-width: 3; }
      .chart-dot { fill: #ECE8E1; stroke: #0F1923; stroke-width: 2; }
      .chart-axis { fill: none; stroke: #2a3a4a; stroke-width: 2; }
      .marker-cross { fill: none; stroke: #FF4655; stroke-width: 1; opacity: 0.7; }
    </style>
  </defs>

  <!-- Background -->
  <rect x="0.5" y="0.5" width="1199" height="239" class="bg" />
  <rect x="0" y="0" width="4" height="240" class="accent" />

  <!-- Top-left Code -->
  <rect x="40" y="32" width="8" height="8" class="accent" />
  <text x="55" y="40" class="text-code">QDA-005</text>

  <!-- Texts -->
  <text x="40" y="85" class="text-title">QUANTITATIVE DATA ANALYTICS</text>
  <text x="40" y="110" class="text-subtitle">STATISTICAL ANALYSIS &amp; VISUALIZATION</text>
  
  <text x="40" y="145" class="text-brief">Applied statistical analysis in R evaluating human performance and driver distractions</text>
  <text x="40" y="165" class="text-brief">with ggplot2 visualizations and inferential statistics.</text>

  <!-- Tech Badges -->
  <g transform="translate(40, 190)">
    <rect x="0" y="0" width="35" height="26" rx="3" class="badge-bg" />
    <text x="17.5" y="17" class="badge-text" text-anchor="middle">R</text>
    
    <rect x="45" y="0" width="65" height="26" rx="3" class="badge-bg" />
    <text x="77.5" y="17" class="badge-text" text-anchor="middle">ggplot2</text>
    
    <rect x="120" y="0" width="70" height="26" rx="3" class="badge-bg" />
    <text x="155" y="17" class="badge-text" text-anchor="middle">RStudio</text>
    
    <rect x="200" y="0" width="75" height="26" rx="3" class="badge-bg" />
    <text x="237.5" y="17" class="badge-text" text-anchor="middle">Statistics</text>
  </g>

  <!-- Right side illustration (Data Visualization) -->
  <g transform="translate(750, 40)">
    <!-- Axes -->
    <line x1="0" y1="160" x2="380" y2="160" class="chart-axis" />
    <line x1="0" y1="0" x2="0" y2="160" class="chart-axis" />

    <!-- Grid Lines -->
    <line x1="0" y1="120" x2="380" y2="120" class="chart-grid" />
    <line x1="0" y1="80" x2="380" y2="80" class="chart-grid" />
    <line x1="0" y1="40" x2="380" y2="40" class="chart-grid" />

    <!-- Abstract Bar Chart -->
    <rect x="30" y="100" width="35" height="60" class="chart-bar" />
    <rect x="95" y="125" width="35" height="35" class="chart-bar" />
    <rect x="160" y="70" width="35" height="90" class="chart-bar" />
    <rect x="225" y="45" width="35" height="115" class="chart-bar" opacity="0.6" fill="#768079" />
    <rect x="290" y="20" width="35" height="140" class="chart-bar" />

    <!-- Trend Line -->
    <path d="M15,130 L112.5,95 L177.5,60 L242.5,45 L320,10" class="chart-trend" />

    <!-- Data Points -->
    <circle cx="15" cy="130" r="5" class="chart-dot" />
    <circle cx="112.5" cy="95" r="5" class="chart-dot" />
    <circle cx="177.5" cy="60" r="5" class="chart-dot" />
    <circle cx="242.5" cy="45" r="5" class="chart-dot" />
    <circle cx="320" cy="10" r="5" class="chart-dot" />

    <!-- Research Coordinate Markers -->
    <g transform="translate(177.5, 60)">
      <line x1="-15" y1="0" x2="15" y2="0" class="marker-cross" />
      <line x1="0" y1="-15" x2="0" y2="15" class="marker-cross" />
      <rect x="5" y="-20" width="35" height="12" fill="#1a2332" stroke="#2a3a4a" stroke-width="1" />
      <text x="22.5" y="-11" font-family="Arial" font-size="8" fill="#22D3EE" text-anchor="middle">p &lt; .05</text>
    </g>
    
    <g transform="translate(320, 10)">
      <line x1="-10" y1="0" x2="10" y2="0" class="marker-cross" />
      <line x1="0" y1="-10" x2="0" y2="10" class="marker-cross" />
    </g>
  </g>

  <!-- Bottom Right Label -->
  <text x="1160" y="220" class="label-bottom">TACTICAL // DATA</text>
  
  <!-- Decorative corner elements -->
  <path d="M 1180 20 L 1180 30 M 1180 20 L 1170 20" fill="none" stroke="#2a3a4a" stroke-width="1" />
  <path d="M 1180 220 L 1180 210 M 1180 220 L 1170 220" fill="none" stroke="#2a3a4a" stroke-width="1" />
  <path d="M 20 220 L 20 210 M 20 220 L 30 220" fill="none" stroke="#2a3a4a" stroke-width="1" />
</svg>
