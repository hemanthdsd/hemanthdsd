<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 380">
  <defs>
    <style>
      .text-label { font-family: Arial, Helvetica, sans-serif; font-size: 11px; font-weight: 600; fill: #6E6E73; letter-spacing: 2px; text-transform: uppercase; }
      .text-headline { font-family: Arial, Helvetica, sans-serif; font-size: 36px; font-weight: 700; fill: #0B0B0F; }
      .text-desc { font-family: Arial, Helvetica, sans-serif; font-size: 15px; fill: #6E6E73; }
      .text-tech { font-family: Arial, Helvetica, sans-serif; font-size: 13px; fill: #6E6E73; }
    </style>
    <linearGradient id="bar-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0071E3" />
      <stop offset="100%" stop-color="#7D5CFF" />
    </linearGradient>
  </defs>
  <rect width="1398" height="378" x="1" y="1" fill="#F5F5F7" stroke="#D2D2D7" stroke-width="1" rx="20" />
  
  <!-- Left Side Text (x=80) -->
  <text x="80" y="100" class="text-label">DATA ANALYTICS</text>
  <text x="80" y="150" class="text-headline">Statistical analysis</text>
  <text x="80" y="195" class="text-headline">with a clear story.</text>
  
  <text x="80" y="240" class="text-desc">Applied inferential statistics, regression</text>
  <text x="80" y="265" class="text-desc">analysis and data visualization in R.</text>
  
  <text x="80" y="310" class="text-tech">R · ggplot2 · RStudio · Statistics</text>
  
  <!-- Right Side Illustration (~550x250) -->
  <g transform="translate(750, 65)">
    <!-- Chart Background/Grid -->
    <line x1="0" y1="50" x2="550" y2="50" stroke="#E5E5EA" stroke-width="1" opacity="0.4" />
    <line x1="0" y1="100" x2="550" y2="100" stroke="#E5E5EA" stroke-width="1" opacity="0.4" />
    <line x1="0" y1="150" x2="550" y2="150" stroke="#E5E5EA" stroke-width="1" opacity="0.4" />
    <line x1="0" y1="200" x2="550" y2="200" stroke="#E5E5EA" stroke-width="1" opacity="0.4" />
    <line x1="0" y1="250" x2="550" y2="250" stroke="#D2D2D7" stroke-width="1" />
    <line x1="0" y1="0" x2="0" y2="250" stroke="#D2D2D7" stroke-width="1" />
    
    <!-- Bars -->
    <rect x="40" y="150" width="40" height="100" rx="4" fill="url(#bar-grad)" opacity="0.3" />
    <rect x="120" y="110" width="40" height="140" rx="4" fill="url(#bar-grad)" opacity="0.5" />
    <rect x="200" y="160" width="40" height="90" rx="4" fill="url(#bar-grad)" opacity="0.4" />
    <rect x="280" y="80" width="40" height="170" rx="4" fill="url(#bar-grad)" opacity="0.7" />
    <rect x="360" y="130" width="40" height="120" rx="4" fill="url(#bar-grad)" opacity="0.6" />
    <rect x="440" y="40" width="40" height="210" rx="4" fill="url(#bar-grad)" opacity="0.8" />
    
    <!-- Trend Line -->
    <path d="M 20 180 Q 150 100, 250 140 T 500 50" fill="none" stroke="#0B0B0F" stroke-width="2.5" />
    
    <!-- Data Points -->
    <circle cx="20" cy="180" r="3" fill="#0071E3" />
    <circle cx="100" cy="144" r="3" fill="#0071E3" />
    <circle cx="180" cy="120" r="3" fill="#0071E3" />
    <circle cx="250" cy="140" r="3" fill="#0071E3" />
    <circle cx="330" cy="130" r="3" fill="#0071E3" />
    <circle cx="410" cy="91" r="3" fill="#0071E3" />
    <circle cx="500" cy="50" r="3" fill="#0071E3" />
  </g>
</svg>
