<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 380" width="100%" height="100%">
  <!-- Background -->
  <rect x="2" y="2" width="1396" height="376" rx="24" fill="#111111" stroke="#333336" stroke-width="2"/>
  
  <!-- Left Side Text -->
  <g font-family="Arial, Helvetica, sans-serif">
    <text x="80" y="100" fill="#86868B" font-size="11" font-weight="600" letter-spacing="2">DATA ANALYTICS</text>
    <text x="80" y="150" fill="#FFFFFF" font-size="40" font-weight="700">Statistical analysis</text>
    <text x="80" y="195" fill="#FFFFFF" font-size="40" font-weight="700">with a clear story.</text>
    
    <text x="80" y="240" fill="#86868B" font-size="16">Applied inferential statistics, regression</text>
    <text x="80" y="265" fill="#86868B" font-size="16">analysis and data visualization in R.</text>
    
    <text x="80" y="320" fill="#86868B" font-size="13">R · ggplot2 · RStudio · Statistics</text>
  </g>

  <!-- Right Side Illustration (Chart) -->
  <g transform="translate(800, 60)">
    <!-- Ambient glow -->
    <defs>
      <filter id="glow1" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur stdDeviation="30" result="blur" />
      </filter>
    </defs>
    <circle cx="250" cy="130" r="100" fill="#2997ff" opacity="0.15" filter="url(#glow1)"/>
    
    <!-- Histogram Bars -->
    <rect x="50" y="160" width="40" height="80" rx="4" fill="#1c1c1e" stroke="#333336" stroke-width="2"/>
    <rect x="110" y="120" width="40" height="120" rx="4" fill="#1c1c1e" stroke="#333336" stroke-width="2"/>
    <rect x="170" y="70" width="40" height="170" rx="4" fill="#1c1c1e" stroke="#333336" stroke-width="2"/>
    <rect x="230" y="100" width="40" height="140" rx="4" fill="#1c1c1e" stroke="#333336" stroke-width="2"/>
    <rect x="290" y="50" width="40" height="190" rx="4" fill="#1c1c1e" stroke="#333336" stroke-width="2"/>
    <rect x="350" y="130" width="40" height="110" rx="4" fill="#1c1c1e" stroke="#333336" stroke-width="2"/>
    <rect x="410" y="90" width="40" height="150" rx="4" fill="#1c1c1e" stroke="#333336" stroke-width="2"/>
    
    <!-- Regression Line -->
    <path d="M 30 180 L 130 130 L 190 70 L 250 110 L 310 50 L 370 140 L 450 80" fill="none" stroke="#2997ff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Data Points on Line -->
    <circle cx="30" cy="180" r="4" fill="#FFFFFF"/>
    <circle cx="130" cy="130" r="4" fill="#FFFFFF"/>
    <circle cx="190" cy="70" r="4" fill="#FFFFFF"/>
    <circle cx="250" cy="110" r="4" fill="#FFFFFF"/>
    <circle cx="310" cy="50" r="4" fill="#FFFFFF"/>
    <circle cx="370" cy="140" r="4" fill="#FFFFFF"/>
    <circle cx="450" cy="80" r="4" fill="#FFFFFF"/>
  </g>
</svg>
