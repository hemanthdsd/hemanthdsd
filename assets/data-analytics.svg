<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200">
<style>
  .bg { fill: transparent; }
  .border { stroke: #d0d7de; stroke-width: 1; fill: none; }
  .text-primary { fill: #24292f; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
  .text-secondary { fill: #57606a; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
  .accent-blue { stroke: #0969da; fill: none; }
  .accent-purple { stroke: #8250df; fill: none; }
  .fill-blue { fill: #0969da; opacity: 0.1; }
  .fill-purple { fill: #8250df; opacity: 0.1; }
  
  @media (prefers-color-scheme: dark) {
    .border { stroke: #30363d; }
    .text-primary { fill: #c9d1d9; }
    .text-secondary { fill: #8b949e; }
    .accent-blue { stroke: #58a6ff; }
    .accent-purple { stroke: #bc8cff; }
    .fill-blue { fill: #58a6ff; opacity: 0.15; }
    .fill-purple { fill: #bc8cff; opacity: 0.15; }
  }
</style>
<rect width="100%" height="100%" class="bg" />

<!-- Bars -->
<g class="border">
  <rect x="150" y="140" width="60" height="40" />
  <rect x="250" y="110" width="60" height="70" />
  <rect x="350" y="60" width="60" height="120" />
  <rect x="450" y="30" width="60" height="150" />
  <rect x="550" y="80" width="60" height="100" />
  <rect x="650" y="120" width="60" height="60" />
  <rect x="750" y="160" width="60" height="20" />
</g>

<g class="fill-blue">
  <rect x="150" y="140" width="60" height="40" />
  <rect x="250" y="110" width="60" height="70" />
  <rect x="350" y="60" width="60" height="120" />
  <rect x="450" y="30" width="60" height="150" />
  <rect x="550" y="80" width="60" height="100" />
  <rect x="650" y="120" width="60" height="60" />
  <rect x="750" y="160" width="60" height="20" />
</g>

<!-- Trend line -->
<path d="M 180 140 L 280 100 L 380 50 L 480 30 L 580 70 L 680 120 L 780 160" class="accent-purple" stroke-width="2" />
<g class="accent-purple" stroke-width="2" fill="#fff">
  <circle cx="180" cy="140" r="4" />
  <circle cx="280" cy="100" r="4" />
  <circle cx="380" cy="50" r="4" />
  <circle cx="480" cy="30" r="4" />
  <circle cx="580" cy="70" r="4" />
  <circle cx="680" cy="120" r="4" />
  <circle cx="780" cy="160" r="4" />
</g>
</svg>
