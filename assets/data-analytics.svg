<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 200" fill="none">
  <defs>
    <linearGradient id="card-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="data-accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4facfe"/>
      <stop offset="100%" stop-color="#00f2fe"/>
    </linearGradient>
    <filter id="card-shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Card background -->
  <rect width="420" height="200" rx="12" fill="url(#card-bg)" stroke="#2d2d5e" stroke-width="1" filter="url(#card-shadow)"/>

  <!-- Accent bar -->
  <rect x="0" y="0" width="420" height="4" rx="2" fill="url(#data-accent)"/>

  <!-- Icon area -->
  <g transform="translate(28, 30)">
    <rect width="44" height="44" rx="10" fill="#4facfe" opacity="0.15"/>
    <!-- Bar chart icon -->
    <g transform="translate(10, 8)" fill="none" stroke="#4facfe" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="12" width="4" height="10" rx="1" fill="#4facfe" opacity="0.3"/>
      <rect x="8" y="6" width="4" height="16" rx="1" fill="#4facfe" opacity="0.5"/>
      <rect x="14" y="9" width="4" height="13" rx="1" fill="#4facfe" opacity="0.4"/>
      <rect x="20" y="3" width="4" height="19" rx="1" fill="#4facfe" opacity="0.6"/>
      <line x1="1" y1="23" x2="25" y2="23"/>
    </g>
  </g>

  <!-- Project title -->
  <text x="84" y="50" font-family="'Segoe UI', Arial, sans-serif" font-size="20" font-weight="700" fill="#ffffff">
    Data Analytics
  </text>

  <!-- Category badge -->
  <rect x="84" y="58" width="130" height="20" rx="10" fill="#4facfe" opacity="0.2"/>
  <text x="149" y="72" font-family="'Segoe UI', Arial, sans-serif" font-size="10" font-weight="600" fill="#67e8f9" text-anchor="middle">
    DATA / STATISTICS
  </text>

  <!-- Description -->
  <text x="28" y="110" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#94a3b8">
    Applied statistical analysis in R evaluating human
  </text>
  <text x="28" y="128" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#94a3b8">
    performance, driver distractions, and task
  </text>
  <text x="28" y="146" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#94a3b8">
    interruptions with ggplot2 visualizations.
  </text>

  <!-- Tech stack chips -->
  <g transform="translate(28, 160)">
    <rect x="0" y="0" width="26" height="22" rx="11" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="13" y="15" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">R</text>

    <rect x="34" y="0" width="66" height="22" rx="11" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="67" y="15" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">ggplot2</text>

    <rect x="108" y="0" width="66" height="22" rx="11" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="141" y="15" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">RStudio</text>

    <rect x="182" y="0" width="76" height="22" rx="11" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="220" y="15" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Statistics</text>

    <rect x="266" y="0" width="96" height="22" rx="11" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="314" y="15" font-family="'Segoe UI', Arial, sans-serif" font-size="10" fill="#64748b" text-anchor="middle">Visualization</text>
  </g>

  <!-- Arrow icon (top right) -->
  <g transform="translate(378, 28)" opacity="0.3">
    <line x1="0" y1="16" x2="16" y2="0" stroke="#4facfe" stroke-width="2" stroke-linecap="round"/>
    <polyline points="6,0 16,0 16,10" fill="none" stroke="#4facfe" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
